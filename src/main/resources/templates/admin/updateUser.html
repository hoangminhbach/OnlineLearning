<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin_layout :: layout(pageTitle = ~{::title}, pageContent = ~{::.page-content-wrapper}, pageScripts = ~{::.page-scripts-wrapper})}">
<head><title>Cập nhật Người Dùng</title></head>
<body>
<div class="page-content-wrapper">
    <div class="container">
        <div class="header">
            <h1>Cập nhật Người Dùng</h1>
            <a th:href="@{/admin/users}" class="btn btn-outline">Quay lại</a>
        </div>

        <form th:action="@{/admin/users/update/{id}(id=${user.id})}" th:object="${user}" method="post" class="col-md-6 mx-auto">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label class="required">Email</label>
                <input type="email" th:field="*{email}" class="input-field" readonly>
            </div>

            <div class="form-group">
                <label class="required">Họ tên</label>
                <input type="text" th:field="*{fullName}" class="input-field" readonly>
            </div>

            <div class="form-group">
                <label class="required">Giới tính</label>
                <input type="text" th:value="${user.gender != null ? user.gender.displayName : '-'}" class="input-field" readonly>
            </div>

            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" th:field="*{mobile}" class="input-field" readonly>
            </div>

            <div class="form-group">
                <label>Địa chỉ</label>
                <input type="text" th:field="*{address}" class="input-field" readonly>
            </div>

            <div class="form-group">
                <label class="required">Vai trò</label>
                <select name="roleId" class="input-field" required>
                    <option value="">-- Chọn vai trò --</option>
                    <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.name}" th:selected="${r.id == user.role.id}"></option>
                </select>
            </div>

            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" th:field="*{enabled}">
                    <span>Hoạt động</span>
                </label>
            </div>

            <button type="submit" class="submit-btn">Cập nhật</button>
        </form>
    </div>
</div>
<th:block class="page-scripts-wrapper"></th:block>
</body>
</html>
