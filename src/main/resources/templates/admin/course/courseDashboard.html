<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin_layout :: layout(
        pageTitle = ~{::title},
        pageContent = ~{::.page-content-wrapper},
        pageScripts = ~{::.page-scripts-wrapper}
      )}">
<head>
    <title>Quản lý khóa học</title>
</head>
<body>
<div class="page-content-wrapper content-area">
    <div class="container">
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
        </div>
        <div class="header">
            <h1>Quản lý khóa học</h1>
            <a th:href="@{/courses/create}" class="btn btn-primary"><i class="fas fa-plus"></i> Tạo Khóa Học Mới</a>
        </div>

        <form th:action="@{/courses/admin}" method="get" class="filters">
            <div class="filter-group search-box">
                <label for="keyword">Tìm kiếm theo tên</label>
                <input type="text" id="keyword" name="keyword" placeholder="Nhập tên khóa học..." th:value="${currentKeyword}">
            </div>
            <div class="filter-group">
                <label for="status">Trạng thái</label>
                <select id="status" name="status">
                    <option value="">Tất cả trạng thái</option>
                    <option th:each="st : ${allStatuses}"
                            th:value="${st}"
                            th:text="${st.displayName}"
                            th:selected="${st == currentStatus}">Status</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="categoryId">Danh mục</label>
                <select id="categoryId" name="categoryId">
                    <option value="">Tất cả danh mục</option>
                    <option th:each="cat : ${allCategories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${cat.id == currentCategoryId}">Category</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="expertId">Chuyên gia</label>
                <select id="expertId" name="expertId">
                    <option value="">Tất cả chuyên gia</option>
                    <option th:each="expert : ${allExperts}"
                            th:value="${expert.id}"
                            th:text="${expert.fullName}"
                            th:selected="${expert.id == currentExpertId}">Expert</option>
                </select>
            </div>
            <div class="filter-group d-flex justify-content-end">
                <input type="hidden" name="sort" th:value="${#strings.arrayJoin(coursePage.sort.toString().split(': '), ',')}">
                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-filter"></i> Lọc</button>
            </div>
        </form>

        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>
                        <a th:href="@{/courses/admin(expertId=${currentExpertId}, status=${currentStatus}, categoryId=${currentCategoryId}, keyword=${currentKeyword}, sort=${coursePage.sort.getOrderFor('name') == null || coursePage.sort.getOrderFor('name').direction.name() == 'DESC' ? 'name,asc' : 'name,desc'})}">
                            Tên Khóa Học
                            <span th:if="${coursePage.sort.getOrderFor('name') != null}" class="sort-icon">
                                <i th:classappend="${coursePage.sort.getOrderFor('name').direction.name() == 'ASC' ? 'fas fa-arrow-up' : 'fas fa-arrow-down'}"></i>
                            </span>
                        </a>
                    </th>
                    <th>Danh Mục</th>
                    <th>Trạng Thái</th>
                    <th>Nổi Bật</th>
                    <th>Giá</th>
                    <th>
                        <a th:href="@{/courses/users/{id}(id=${expertId}, status=${currentStatus}, categoryId=${currentCategoryId}, keyword=${currentKeyword}, sort=${coursePage.sort.getOrderFor('createdAt') == null || coursePage.sort.getOrderFor('createdAt').direction.name() == 'ASC' ? 'createdAt,desc' : 'createdAt,asc'})}">
                            Ngày Tạo
                            <span th:if="${coursePage.sort.getOrderFor('createdAt') != null}" class="sort-icon">
                                <i th:classappend="${coursePage.sort.getOrderFor('createdAt').direction.name() == 'ASC' ? 'fas fa-arrow-up' : 'fas fa-arrow-down'}"></i>
                            </span>
                        </a>
                    </th>
                    <th>
                        <a th:href="@{/courses/users/{id}(id=${expertId}, status=${currentStatus}, categoryId=${currentCategoryId}, keyword=${currentKeyword}, sort=${coursePage.sort.getOrderFor('updatedAt') == null || coursePage.sort.getOrderFor('updatedAt').direction.name() == 'ASC' ? 'updatedAt,desc' : 'updatedAt,asc'})}">
                            Cập Nhật
                            <span th:if="${coursePage.sort.getOrderFor('updatedAt') != null}" class="sort-icon">
                                <i th:classappend="${coursePage.sort.getOrderFor('updatedAt').direction.name() == 'ASC' ? 'fas fa-arrow-up' : 'fas fa-arrow-down'}"></i>
                            </span>
                        </a>
                    </th>
                    <th>Hành Động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${coursePage.totalElements == 0}">
                    <td colspan="9" class="no-data">Không tìm thấy khóa học nào.</td>
                </tr>
                <tr th:each="course : ${coursePage.content}">
                    <td th:text="${course.id}">1</td>
                    <td th:text="${course.name}">Course Name</td>
                    <td th:text="${course.category?.name}">Category</td>
                    <td>
                        <span class="badge" th:classappend="'status-' + ${course.status.name()}" th:text="${course.status.displayName}">Status</span>
                    </td>
                    <td>
                        <div class="form-check form-switch d-flex justify-content-center">
                            <input class="form-check-input featured-toggle" type="checkbox" role="switch" onChange="return confirm(`Bạn có chắc chắn muốn set giá trị nổi bật về ${course.featured}`)"
                                   th:id="'featuredSwitch-' + ${course.id}"
                                   th:checked="${course.featured}"
                                   th:data-course-id="${course.id}">
                        </div>
                    </td>
                    <td th:text="${#numbers.formatCurrency(course.price * (1 - course.discount / 100.0))}">Price</td>
                    <td th:text="${#temporals.format(course.createdAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                    <td th:text="${#temporals.format(course.updatedAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                    <td>
                        <div class="d-flex gap-2 mb-2"> <a th:href="@{'/courses/' + ${course.id} + '/update'}" class="btn btn-sm btn-outline-primary flex-fill" title="Xem thông tin">
                            <i class="fas fa-eye"></i> Thông tin
                        </a>
                            <a th:if="${course.status.name() != 'PUBLISHED'}" th:href="@{'/courses/' + ${course.id}}" class="btn btn-sm btn-outline-primary flex-fill" title="Xem nội dung">
                                <i class="fas fa-list-alt"></i> Nội dung
                            </a>
                            <a th:unless="${course.status.name() != 'PUBLISHED'}" th:href="@{'/courses/' + ${course.id} + '/learner'}" class="btn btn-sm btn-outline-primary flex-fill" title="Xem nội dung">
                                <i class="fas fa-list-alt"></i> Nội dung
                            </a>
                        </div>

                        <form th:action="@{'/courses/' + ${course.id} + '?admin-respond=true'}" method="post"
                              onsubmit="return confirm('Sau khi phê duyệt thì thông tin và nội dung của khóa học sẽ được public và không thể sửa đổi! Bạn có chắc muốn phê duyệt khóa học này không?');" class="d-grid">
                            <button type="submit" class="btn btn-sm btn-warning w-100"> <i class="fas fa-paper-plane"></i> Phê duyệt
                            </button>
                        </form>
                        <form th:action="@{'/courses/' + ${course.id} + '?admin-respond=false'}" method="post"
                              onsubmit="return confirm('Khóa học sẽ lưu ở trạng thái DRAFT và gửi về cho chuyên gia. Bạn có chắc chắn không phê duyệt khóa học này không?');" class="d-grid">
                            <button type="submit" class="btn btn-sm btn-danger w-100"> <i class="fas fa-paper-plane"></i> Không phê duyệt
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <nav aria-label="Page navigation" th:if="${coursePage.totalPages > 1}" class="mt-4">
            <ul class="pagination">
                <li class="page-item">
                    <span th:if="${coursePage.first}" class="page-link disabled">«</span>
                    <a th:unless="${coursePage.first}" class="page-link"
                       th:href="@{/courses/admin(expertId=${expertId}, status=${currentStatus}, categoryId=${currentCategoryId}, keyword=${currentKeyword}, page=${coursePage.number - 1}, size=${coursePage.size}, sort=${#strings.arrayJoin(coursePage.sort.toString().split(': '), ',')})}">«</a>
                </li>

                <li class="page-item" th:each="pageNumber : ${#numbers.sequence(0, coursePage.totalPages - 1)}">
                    <span th:if="${pageNumber == coursePage.number}" class="page-link active" th:text="${pageNumber + 1}">1</span>
                    <a th:unless="${pageNumber == coursePage.number}" class="page-link"
                       th:href="@{/courses/admin(expertId=${expertId}, status=${currentStatus}, categoryId=${currentCategoryId}, keyword=${currentKeyword}, page=${pageNumber}, size=${coursePage.size}, sort=${#strings.arrayJoin(coursePage.sort.toString().split(': '), ',')})}"
                       th:text="${pageNumber + 1}">1</a>
                </li>

                <li class="page-item">
                    <span th:if="${coursePage.last}" class="page-link disabled">»</span>
                    <a th:unless="${coursePage.last}" class="page-link"
                       th:href="@{/courses/admin(expertId=${expertId}, status=${currentStatus}, categoryId=${currentCategoryId}, keyword=${currentKeyword}, page=${coursePage.number + 1}, size=${coursePage.size}, sort=${#strings.arrayJoin(coursePage.sort.toString().split(': '), ',')})}">»</a>
                </li>
            </ul>
        </nav>

    </div>
</div>

<th:block class="page-scripts-wrapper">
    <script>
        // --- FEATURED TOGGLE LOGIC ---
        document.addEventListener('DOMContentLoaded', function() {
            const tableBody = document.querySelector('table tbody'); // Tìm thẻ tbody

            if (tableBody) {
                tableBody.addEventListener('change', async function(event) {
                    // Chỉ xử lý nếu event xảy ra trên phần tử có class 'featured-toggle'
                    if (event.target.classList.contains('featured-toggle')) {
                        const toggleSwitch = event.target;
                        const courseId = toggleSwitch.dataset.courseId;
                        const isChecked = toggleSwitch.checked;

                        // (Optional) Vô hiệu hóa switch tạm thời
                        toggleSwitch.disabled = true;

                        try {
                            const res = await fetch(`/courses/api/${courseId}/toggle-featured`, {
                                method: 'PATCH', // Hoặc PUT/POST tùy API của bạn
                                headers: {
                                    'Content-Type': 'application/json',
                                    // Thêm header Authorization nếu cần
                                },
                                body: JSON.stringify({ featured: isChecked }) // Gửi trạng thái mới
                            });

                            const apiResponse = await res.json(); // Luôn đọc response để kiểm tra

                            if (!res.ok) {
                                throw new Error(apiResponse.message || 'Cập nhật thất bại!');
                            }

                            // showToast(`Đã ${isChecked ? 'bật' : 'tắt'} nổi bật cho khóa học ${courseId}.`);
                            // Không cần showToast vì đã thấy kết quả ngay trên switch

                        } catch (err) {
                            showToast(err.message || 'Có lỗi xảy ra', 'error');
                            // QUAN TRỌNG: Hoàn tác lại trạng thái switch nếu API lỗi
                            toggleSwitch.checked = !isChecked;
                        } finally {
                            // (Optional) Kích hoạt lại switch
                            toggleSwitch.disabled = false;
                        }
                    }
                });
            }
        });
    </script>
</th:block>
</body>
</html>
