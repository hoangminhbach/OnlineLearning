<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin_layout :: layout(pageTitle = ~{::title}, pageContent = ~{::.page-content-wrapper}, pageScripts = ~{::.page-scripts-wrapper})}">
<head><title>Tạo Slider</title></head>
<body>
<div class="page-content-wrapper">
    <div class="container">
        <div class="header">
            <h1>Tạo Slider</h1>
            <a th:href="@{/admin/sliders}" class="btn btn-outline">
                <i class="bi bi-arrow-left"></i> Quay Lại
            </a>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/admin/sliders/create}" method="post" th:object="${slider}" enctype="multipart/form-data">
            <div class="row g-4">
                <div class="col-md-8">
                    <div class="form-card">
                        <h3 class="form-card-title">Thông Tin Slider</h3>
                        <div class="form-group">
                            <label class="required">Tiêu Đề</label>
                            <input type="text" th:field="*{title}" class="input-field" placeholder="Nhập tiêu đề slider" required>
                        </div>

                        <div class="form-group">
                            <label>Mô Tả</label>
                            <textarea th:field="*{description}" class="input-field" rows="3" placeholder="Nhập mô tả"></textarea>
                        </div>

                        <div class="form-group">
                            <label>Link URL</label>
                            <input type="url" th:field="*{linkUrl}" class="input-field" placeholder="https://example.com">
                        </div>

                        <div class="form-group">
                            <label>Thứ Tự Hiển Thị</label>
                            <input type="number" th:field="*{orderNumber}" class="input-field" value="0">
                        </div>

                        <div class="form-group">
                            <label>Trạng Thái</label>
                            <select th:field="*{status}" class="input-field">
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}">Status</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="form-card">
                        <h3 class="form-card-title">Hình Ảnh</h3>
                        <div class="form-group">
                            <label class="required">Chọn Hình Ảnh</label>
                            <input type="file" name="imageFile" class="input-field" accept="image/*" required>
                        </div>
                        <div class="image-preview">
                            <img id="previewImage" src="#" alt="Preview" style="display: none; max-width: 100%; border-radius: 8px;">
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/admin/sliders}" class="btn btn-outline">Hủy</a>
                <button type="submit" class="btn btn-primary">Tạo Slider</button>
            </div>
        </form>
    </div>
</div>

<th:block class="page-scripts-wrapper">
<script>
document.querySelector('input[name="imageFile"]').addEventListener('change', function(e) {
    const preview = document.getElementById('previewImage');
    if (this.files && this.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(this.files[0]);
    }
});
</script>
</th:block>
</body>
</html>
