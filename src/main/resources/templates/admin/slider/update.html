<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin_layout :: layout(pageTitle = ~{::title}, pageContent = ~{::.page-content-wrapper}, pageScripts = ~{::.page-scripts-wrapper})}">
<head><title>Cập Nhật Slider</title></head>
<body>
<div class="page-content-wrapper">
    <div class="container">
        <div class="header">
            <h1>Cập Nhật Slider</h1>
            <a th:href="@{/admin/sliders}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Quay Lại
            </a>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/admin/sliders/update/{id}(id=${slider.id})}" method="post" th:object="${slider}" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-8">
                    <div class="card mb-4">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">Thông Tin Slider</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">Tiêu Đề *</label>
                                <input type="text" th:field="*{title}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mô Tả</label>
                                <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Link URL</label>
                                <input type="url" th:field="*{linkUrl}" class="form-control" placeholder="https://example.com">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Thứ Tự Hiển Thị</label>
                                <input type="number" th:field="*{orderNumber}" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Trạng Thái</label>
                                <select th:field="*{status}" class="form-select">
                                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}">Status</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card mb-4">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">Hình Ảnh</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">Chọn Hình Ảnh Mới</label>
                                <input type="file" name="imageFile" class="form-control" accept="image/*">
                            </div>
                            <div class="text-center">
                                <p>Hình ảnh hiện tại:</p>
                                <img th:src="@{/uploads/{path}(path=${slider.imageUrl})}" alt="Current"
                                     style="max-width: 100%; max-height: 200px; object-fit: cover;"
                                     th:if="${slider.imageUrl != null}">
                                <p th:if="${slider.imageUrl == null}" class="text-muted">Chưa có ảnh</p>
                                <hr>
                                <img id="previewImage" src="#" alt="Preview" style="max-width: 100%; display: none;">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <a th:href="@{/admin/sliders}" class="btn btn-secondary">Hủy</a>
                <button type="submit" class="btn btn-primary">Cập Nhật</button>
            </div>
        </form>
    </div>
</div>

<th:block class="page-scripts-wrapper">
<script>
document.querySelector('input[name="imageFile"]').addEventListener('change', function(e) {
    const preview = document.getElementById('previewImage');
    if (this.files && this.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(this.files[0]);
    }
});
</script>
</th:block>
</body>
</html>
