<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin_layout :: layout(
        pageTitle = ~{::title},
        pageContent = ~{::.page-content-wrapper},
        pageScripts = ~{::.page-scripts-wrapper}
      )}">
<head>
    <title>Slide Dashboard for Admin</title>
</head>
<body>
<div class="page-content-wrapper content-area">
    <div class="container">
        <div class="header">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/admin">Dashboard</a></li>
                <li class="breadcrumb-item active">Quản lí Slider</li>
            </ol>
        </div>

        <!-- Flash Messages -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="filters">
            <div class="filter-group">
                <label>Trạng thái</label>
                <select id="statusFilter" onchange="applyFilters()">
                    <option value="">Tất cả trạng thái</option>
                    <option value="SHOW" th:selected="${status == 'SHOW'}">Hiển thị</option>
                    <option value="HIDE" th:selected="${status == 'HIDE'}">Ẩn</option>
                    <option value="PENDING" th:selected="${status == 'PENDING'}">Chờ duyệt</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Số lượng hiển thị</label>
                <select id="sizeFilter" onchange="applyFilters()">
                    <option value="5" th:selected="${currentSize == 5}">5</option>
                    <option value="10" th:selected="${currentSize == 10}">10</option>
                    <option value="20" th:selected="${currentSize == 20}">20</option>
                    <option value="50" th:selected="${currentSize == 50}">50</option>
                </select>
            </div>

            <div class="filter-group search-box">
                <label>Tìm kiếm</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text"
                           id="searchInput"
                           placeholder="Tìm theo tiêu đề hoặc link..."
                           th:value="${keyword}">
                    <button type="button" onclick="applyFilters()" class="btn btn-primary">🔍 Tìm kiếm</button>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table id="slidersTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Hình ảnh</th>
                    <th>Tiêu đề</th>
                    <th>Mô tả</th>
                    <th>Thứ tự</th>
                    <th>Trạng thái</th>
                    <th>Link</th>
                    <th>Lượt xem</th>
                    <th>Ngày tạo</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="slider : ${sliderPage}" th:unless="${sliderPage.isEmpty()}">
                    <td th:text="${slider.id}"></td>
                    <td>
                        <img th:if="${slider.imageUrl}"
                             th:src="${slider.imageUrl}"
                             class="slider-image"
                             alt="Slider Image" style="max-width: 200px; object-fit: cover;">
                        <span th:unless="${slider.imageUrl}" style="color: var(--text-light);">Chưa có ảnh</span>
                    </td>
                    <td th:text="${slider.title}"></td>
                    <td th:text="${slider.description}"></td>
                    <td th:text="${slider.orderNumber}"></td>
                    <td>
                        <span th:if="${slider.status == 'SHOW'}" th:text="${slider.status}" class="status-show">Hiển thị</span>
                        <span th:if="${slider.status == 'HIDE'}"  th:text="${slider.status}" class="status-hide">Ẩn</span>
                        <span th:if="${slider.status == 'PENDING'}" th:text="${slider.status}" class="status-hide">Pending</span>
                    </td>
                    <td>
                        <a th:if="${slider.linkUrl}"
                           th:href="${slider.linkUrl}"
                           target="_blank"
                           style="color: var(--primary-color); text-decoration: none;">
                            🔗 Xem link
                        </a>
                        <span th:unless="${slider.linkUrl}" style="color: var(--text-light);">Không có</span>
                    </td>
                    <td th:text="${slider.viewCount}" style="font-weight: 600; color: var(--primary-color);"></td>
                    <td th:text="${#temporals.format(slider.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <div class="actions">
                            <!--                        <a th:href="@{/admin/sliders/update/{id}(id=${slider.id})}"-->
                            <!--                           class="btn btn-outline btn-sm">✏️ Sửa</a>-->
                            <!--                        <button th:onclick="'toggleStatus(' + ${slider.id} + ', \'' + (${slider.status} == 'SHOW' ? 'HIDE' : 'SHOW') + '\')'"-->
                            <!--                                th:class="'btn btn-sm ' + (${slider.status} == 'SHOW' ? 'btn-danger' : 'btn-success')"-->
                            <!--                                th:text="${slider.status == 'SHOW'} ? 'Ẩn' : 'Hiện'">-->
                            <!--                        </button>-->
                            <a class="btn btn-outline btn-sm" th:href="@{/admin/sliders/approve/{id}(id=${slider.id})}">Approve</a>
                            <a class="btn btn-outline btn-sm" th:href="@{/admin/sliders/reject/{id}(id=${slider.id})}">Reject</a>
                            <a class="btn btn-outline btn-sm" th:href="@{/admin/sliders/takeDown/{id}(id=${slider.id})}">Take Down</a>
                            <!--                        <button th:onclick="'deleteSlider(' + ${slider.id} + ')'"-->
                            <!--                                class="btn btn-danger btn-sm">🗑️ Xóa</button>-->
                        </div>
                    </td>
                </tr>
                <tr th:if="${sliderPage.isEmpty()}">
                    <td colspan="10" class="no-data">
                        📝 Không tìm thấy slider nào
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${sliderPage.totalPages > 0}" class="pagination">
            <a th:each="pageNumber : ${#numbers.sequence(startPage + 1, endPage + 1)}"
               th:href="@{/admin/sliders(
                   size=${currentSize},
                   page=${pageNumber - 1},
                   keyword=${keyword},
                   status=${status}
               )}"
               th:text="${pageNumber}"
               th:class="${pageNumber == currentPage + 1} ? 'active' : ''"></a>
        </div>
    </div>
</div>

<th:block class="page-scripts-wrapper">
    <script>
        function applyFilters() {
            const keyword = document.getElementById('searchInput').value;
            const status = document.getElementById('statusFilter').value;
            const size = document.getElementById('sizeFilter').value;

            const urlParams = new URLSearchParams();
            if (keyword) urlParams.set('keyword', keyword);
            if (status) urlParams.set('status', status);
            if (size) urlParams.set('size', size);

            window.location.href = '/admin/sliders?' + urlParams.toString();
        }

        function toggleStatus(id, newStatus) {
            if (confirm('Bạn có chắc chắn muốn thay đổi trạng thái slider này?')) {
                fetch(`/api/sliders/${id}/status?status=${newStatus}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                })
                    .then(response => {
                        if (response.ok) {
                            location.reload();
                        } else {
                            alert('Có lỗi xảy ra khi cập nhật trạng thái');
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('Có lỗi xảy ra khi cập nhật trạng thái');
                    });
            }
        }

        function deleteSlider(id) {
            if (confirm('Bạn có chắc chắn muốn xóa slider này? Hành động này không thể hoàn tác!')) {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = `/marketing/sliders/delete/${id}`;
                document.body.appendChild(form);
                form.submit();
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                applyFilters();
            }
        });
    </script>
</th:block>
</body>
</html>
