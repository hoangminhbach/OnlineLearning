<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin_layout :: layout(pageTitle = ~{::title}, pageContent = ~{::.page-content-wrapper}, pageScripts = ~{::.page-scripts-wrapper})}">
<head><title>Quản lý Slider</title></head>
<body>
<div class="page-content-wrapper">
    <div class="container">
        <div class="header">
            <h1>Quản lý Slider</h1>
            <a th:href="@{/admin/sliders/create}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Tạo Slider
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/admin/sliders}" method="get" class="row g-3 mb-4">
            <div class="col-md-4">
                <input type="text" name="keyword" class="form-control" placeholder="Tìm slider..." th:value="${keyword}">
            </div>
            <div class="col-md-3">
                <select name="status" class="form-select">
                    <option value="">Trạng thái</option>
                    <option th:each="s : ${T(com.example.demo.model.enums.SliderStatus).values()}"
                            th:value="${s}" th:text="${s}" th:selected="${status == s}">Status</option>
                </select>
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-outline-primary">Lọc</button>
                <a th:href="@{/admin/sliders}" class="btn btn-outline-secondary">Đặt lại</a>
            </div>
        </form>

        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Hình Ảnh</th>
                    <th>Tiêu Đề</th>
                    <th>Link</th>
                    <th>Thứ Tự</th>
                    <th>Trạng Thái</th>
                    <th>Ngày Tạo</th>
                    <th>Hành Động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="slider : ${sliders.content}">
                    <td th:text="${slider.id}">1</td>
                    <td>
                        <img th:src="@{/uploads/{path}(path=${slider.imageUrl})}" alt="Slider"
                             style="width: 100px; height: 50px; object-fit: cover;"
                             th:if="${slider.imageUrl != null}">
                        <span th:if="${slider.imageUrl == null}">No Image</span>
                    </td>
                    <td th:text="${slider.title}">Slider Title</td>
                    <td>
                        <a th:href="${slider.linkUrl}" th:text="${slider.linkUrl}" target="_blank" th:if="${slider.linkUrl != null}">Link</a>
                        <span th:if="${slider.linkUrl == null}">-</span>
                    </td>
                    <td th:text="${slider.orderNumber}">1</td>
                    <td>
                        <span th:class="${slider.status == 'APPROVED' ? 'badge bg-success' : (slider.status == 'REJECTED' ? 'badge bg-danger' : (slider.status == 'TAKEN_DOWN' ? 'badge bg-secondary' : 'badge bg-warning'))}"
                              th:text="${slider.status}">PENDING</span>
                    </td>
                    <td th:text="${#temporals.format(slider.createdAt, 'dd/MM/yyyy')}">01/01/2024</td>
                    <td>
                        <a th:href="@{/admin/sliders/update/{id}(id=${slider.id})}" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/admin/sliders/approve/{id}(id=${slider.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-success" th:if="${slider.status == 'PENDING'}">
                                <i class="bi bi-check-circle"></i>
                            </button>
                        </form>
                        <form th:action="@{/admin/sliders/reject/{id}(id=${slider.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-danger" th:if="${slider.status == 'PENDING'}">
                                <i class="bi bi-x-circle"></i>
                            </button>
                        </form>
                        <form th:action="@{/admin/sliders/delete/{id}(id=${slider.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Bạn chắc chắn muốn xóa?')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <nav th:if="${sliders.totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${sliders.first ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/admin/sliders(page=${sliders.number - 1})}">Trước</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, sliders.totalPages - 1)}"
                    th:classappend="${i == sliders.number ? 'active' : ''}">
                    <a class="page-link" th:href="@{/admin/sliders(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${sliders.last ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/admin/sliders(page=${sliders.number + 1})}">Sau</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
<th:block class="page-scripts-wrapper"></th:block>
</body>
</html>
