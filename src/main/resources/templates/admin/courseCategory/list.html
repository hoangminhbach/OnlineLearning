<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin_layout :: layout(pageTitle = ~{::title}, pageContent = ~{::.page-content-wrapper}, pageScripts = ~{::.page-scripts-wrapper})}">
<head><title>Quản lý Danh Mục</title></head>
<body>
<div class="page-content-wrapper">
    <div class="container">
        <div class="header">
            <h1>Quản lý Danh Mục</h1>
            <a th:href="@{/admin/course_categories/create}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Tạo Danh Mục
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên</th>
                    <th>Mô tả</th>
                    <th>Trạng thái</th>
                    <th>Ngày tạo</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cat : ${categories}">
                    <td th:text="${cat.id}">1</td>
                    <td th:text="${cat.name}">Programming</td>
                    <td th:text="${cat.description}">Description</td>
                    <td>
                        <span th:class="${cat.active ? 'badge bg-success' : 'badge bg-secondary'}"
                              th:text="${cat.active ? 'Active' : 'Inactive'}">Active</span>
                    </td>
                    <td th:text="${#temporals.format(cat.createdAt, 'dd/MM/yyyy')}">01/01/2024</td>
                    <td>
                        <a th:href="@{/admin/course_categories/update/{id}(id=${cat.id})}" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{/admin/course_categories/delete/{id}(id=${cat.id})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Bạn chắc chắn muốn xóa?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <nav th:if="${categories.totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${categories.first ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/admin/course_categories(page=${currentPage - 1})}">Trước</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, categories.totalPages - 1)}"
                    th:classappend="${i == currentPage ? 'active' : ''}">
                    <a class="page-link" th:href="@{/admin/course_categories(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${categories.last ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/admin/course_categories(page=${currentPage + 1})}">Sau</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
<th:block class="page-scripts-wrapper"></th:block>
</body>
</html>
