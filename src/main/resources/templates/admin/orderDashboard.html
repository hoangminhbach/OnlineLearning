<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin_layout :: layout(pageTitle = ~{::title}, pageContent = ~{::.page-content-wrapper}, pageScripts = ~{::.page-scripts-wrapper})}">
<head><title>Quản lý Đơn Hàng</title></head>
<body>
<div class="page-content-wrapper">
    <div class="container">
        <div class="header">
            <h1>Quản lý Đơn Hàng</h1>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card bg-primary text-white">
                    <div class="card-body text-center">
                        <h5 class="card-title">Tổng Doanh Thu</h5>
                        <h2 th:text="${#numbers.formatDecimal(totalRevenue, 1, 'POINT', 0, 'POINT')} + ' VNĐ'">0 VNĐ</h2>
                    </div>
                </div>
            </div>
        </div>

        <form th:action="@{/admin/orders}" method="get" class="row g-3 mb-4">
            <div class="col-md-3">
                <input type="text" name="keyword" class="form-control" placeholder="Tìm mã đơn hàng..." th:value="${filter?.keyword}">
            </div>
            <div class="col-md-2">
                <select name="status" class="form-select">
                    <option value="">Trạng thái</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${filter?.status == s}">Status</option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="date" name="startDate" class="form-control" th:value="${filter?.startDate}">
            </div>
            <div class="col-md-2">
                <input type="date" name="endDate" class="form-control" th:value="${filter?.endDate}">
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-outline-primary">Lọc</button>
                <a th:href="@{/admin/orders}" class="btn btn-outline-secondary">Đặt lại</a>
            </div>
        </form>

        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Mã Đơn</th>
                    <th>Khách Hàng</th>
                    <th>Khóa Học</th>
                    <th>Số Tiền</th>
                    <th>Trạng Thái</th>
                    <th>Ngày Đặt</th>
                    <th>Hành Động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders.content}">
                    <td th:text="${order.id}">1</td>
                    <td th:text="${order.orderCode}">ORD-001</td>
                    <td th:text="${order.user?.fullName}">Nguyen Van A</td>
                    <td th:text="${#strings.abbreviate(order.course?.name, 30)}">Course Name</td>
                    <td th:text="${#numbers.formatDecimal(order.amount, 1, 'POINT', 0, 'POINT')} + ' VNĐ'">100,000 VNĐ</td>
                    <td>
                        <span th:class="${order.status == 'SUCCESS' ? 'badge bg-success' : (order.status == 'FAILED' ? 'badge bg-danger' : (order.status == 'REFUNDED' ? 'badge bg-info' : 'badge bg-warning'))}"
                              th:text="${order.status}">PENDING</span>
                    </td>
                    <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">01/01/2024</td>
                    <td>
                        <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-eye"></i>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <nav th:if="${orders.totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${orders.first ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/admin/orders(page=${orders.number - 1})}">Trước</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, orders.totalPages - 1)}"
                    th:classappend="${i == orders.number ? 'active' : ''}">
                    <a class="page-link" th:href="@{/admin/orders(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${orders.last ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/admin/orders(page=${orders.number + 1})}">Sau</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
<th:block class="page-scripts-wrapper"></th:block>
</body>
</html>
