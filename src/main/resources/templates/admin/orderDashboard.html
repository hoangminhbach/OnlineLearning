<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin_layout :: layout(
        pageTitle = ~{::title},
        pageContent = ~{::.page-content-wrapper},
        pageScripts = ~{::.page-scripts-wrapper}
      )}">
<head>
    <meta charset="UTF-8">
    <title>Quản lí doanh thu & đơn hàng</title>
</head>
<body>
<div class="page-content-wrapper content-area">
    <div class="container">
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div class="header">
            <h1>Enrollment Dashboard</h1>
            <!--        <a th:href="@{/courses/create}" class="btn btn-primary"><i class="fas fa-plus"></i> Tạo Khóa Học Mới</a>-->
        </div>
        <div class="container mt-3">
            <div class="row g-3">
                <!-- Chart -->
                <div class="col-12">
                    <div class="card shadow-sm p-3" style="max-height: 600px;display: flex;align-items: center;justify-content: center;">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>
                <!-- Card 1 -->
                <div class="col-md-6">
                    <div class="card text-center shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">Tổng doanh thu</h5>
                            <p class="fs-4 fw-bold" th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></p>
                        </div>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="col-md-6">
                    <div class="card text-center shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">Tổng số đơn hàng</h5>
                            <p class="fs-4 fw-bold" th:text="${allOrders.size()}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>



        <form method="get" th:action="@{/admin/orders}" class="filters">
            <div class="filter-group search-box">
                <label for="keyword">Tìm kiếm theo tên</label>
                <input type="text" id="keyword" name="keyword" placeholder="Nhập mã đơn hàng..." th:value="${currentKeyword}">
            </div>

            <div class="filter-group">
                <label for="chartType">Loại biểu đồ</label>
                <select id="chartType" name="chartType">
                    <option value="line" th:selected="${chartType == 'line'}">Đường</option>
                    <option value="bar" th:selected="${chartType == 'bar'}">Cột</option>
                    <option value="pie" th:selected="${chartType == 'pie'}">Tròn</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="status">Trạng thái</label>
                <select id="status" name="status">
                    <option value="">Tất cả trạng thái</option>
                    <option th:each="st : ${allStatuses}"
                            th:value="${st}"
                            th:text="${st}"
                            th:selected="${st.name().equals(filter.status)}"
                    >Status</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="startUpdate">Từ</label>
                <input type="date" name="startUpdate" class="form-control" id="startUpdate" th:value="${startUpdate}">
            </div>
            <div class="filter-group">
                <label for="endUpdate">Đến</label>
                <input type="date" name="endUpdate" class="form-control" id="endUpdate" th:value="${endUpdate}">
            </div>

            <div class="filter-group">
                <label for="sortBy">Sắp xếp bởi</label>
                <select name="sortBy" id="sortBy">
                    <option value="updatedAt" th:selected="${filter.sortBy == 'updatedAt'}">Updated</option>
                    <option value="createdAt" th:selected="${filter.sortBy == 'createdAt'}">Created</option>
                    <option value="amount" th:selected="${filter.sortBy == 'amount'}">Amount</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="sortDir">Sắp xếp theo</label>
                <select name="sortDir" id="sortDir">
                    <option value="asc" th:selected="${filter.sortDir == 'asc'}">↑ Asc</option>
                    <option value="desc" th:selected="${filter.sortDir == 'desc'}">↓ Desc</option>
                </select>
            </div>


            <button type="submit" class="btn btn-primary w-100"><i class="fas fa-filter"></i> Lọc</button>
        </form>

        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Mã đơn hàng</th>
                    <th>Tên khóa học</th>
                    <th>Khách hàng</th>
                    <th>Trạng thái</th>
                    <th>Số tiền</th>
                    <th>Ngày tạo</th>
                    <th>Cập nhật</th>
                    <th>Hành Động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${orders.isEmpty()}">
                    <td colspan="9" class="no-data">Không tìm thấy order nào.</td>
                </tr>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.id}">1</td>
                    <td th:text="${order.orderCode}">Order code</td>
                    <td th:text="${order.course.name}">Course</td>
                    <td th:text="${order.user.fullName}">User</td>
                    <td><span  th:text="${order.status}">Status</span></td>
                    <td th:text="${#numbers.formatDecimal(order.amount, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                    <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                    <td th:text="${#temporals.format(order.updatedAt, 'dd/MM/yyyy HH:mm')}">Date</td>

                    <td>
<!--                        <a class="btn-primary" href="">Cancel</a>-->
                        <a class="btn btn-primary" th:href="@{/admin/orders/{id}(id=${order.id})}">Detail</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!--    <nav aria-label="Page navigation" th:if="${coursePage.totalPages > 1}" class="mt-4">-->
        <!--        <ul class="pagination">-->
        <!--            <li class="page-item">-->
        <!--                <span th:if="${coursePage.first}" class="page-link disabled">«</span>-->
        <!--                <a th:unless="${coursePage.first}" class="page-link"-->
        <!--                   th:href="@{/courses/users/{id}(id=${expertId}, status=${currentStatus}, categoryId=${currentCategoryId}, keyword=${currentKeyword}, page=${coursePage.number - 1}, size=${coursePage.size}, sort=${#strings.arrayJoin(coursePage.sort.toString().split(': '), ',')})}">«</a>-->
        <!--            </li>-->

        <!--            <li class="page-item" th:each="pageNumber : ${#numbers.sequence(0, coursePage.totalPages - 1)}">-->
        <!--                <span th:if="${pageNumber == coursePage.number}" class="page-link active" th:text="${pageNumber + 1}">1</span>-->
        <!--                <a th:unless="${pageNumber == coursePage.number}" class="page-link"-->
        <!--                   th:href="@{/courses/users/{id}(id=${expertId}, status=${currentStatus}, categoryId=${currentCategoryId}, keyword=${currentKeyword}, page=${pageNumber}, size=${coursePage.size}, sort=${#strings.arrayJoin(coursePage.sort.toString().split(': '), ',')})}"-->
        <!--                   th:text="${pageNumber + 1}">1</a>-->
        <!--            </li>-->

        <!--            <li class="page-item">-->
        <!--                <span th:if="${coursePage.last}" class="page-link disabled">»</span>-->
        <!--                <a th:unless="${coursePage.last}" class="page-link"-->
        <!--                   th:href="@{/courses/users/{id}(id=${expertId}, status=${currentStatus}, categoryId=${currentCategoryId}, keyword=${currentKeyword}, page=${coursePage.number + 1}, size=${coursePage.size}, sort=${#strings.arrayJoin(coursePage.sort.toString().split(': '), ',')})}">»</a>-->
        <!--            </li>-->
        <!--        </ul>-->
        <!--    </nav>-->

        <div >
            <nav th:if="${totalPages > 1}">
                <ul class="pagination justify-content-center">

                    <!-- Previous -->
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/orders(page=${currentPage - 1}, size=${pageSize},
                        status=${filter.status}, sortBy=${filter.sortBy}, sortDir=${filter.sortDir}, startDate=${filter.startUpdate}, chartType=${chartType})}">
                            « Prev
                        </a>
                    </li>

                    <!-- Page numbers -->
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/admin/orders(page=${i}, size=${pageSize},
                        status=${filter.status}, sortBy=${filter.sortBy}, sortDir=${filter.sortDir}, startDate=${filter.startDate}, chartType=${chartType})}">
                        </a>
                    </li>

                    <!-- Next -->
                    <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/orders(page=${currentPage + 1}, size=${pageSize},
                        status=${filter.status}, sortBy=${filter.sortBy}, sortDir=${filter.sortDir}, startDate=${filter.startUpdate}, chartType=${chartType})}">
                            Next »
                        </a>
                    </li>
                </ul>
            </nav>

            <p class="text-muted mt-2">
                Trang <b th:text="${currentPage + 1}"></b> / <b th:text="${totalPages}"></b>
            </p>
        </div>
    </div>
</div>

<th:block class="page-scripts-wrapper">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const monthLabels = [[${monthLabels}]];
        const monthTotals = [[${monthTotals}]];

        const ctx = document.getElementById('revenueChart').getContext('2d');
        let currentType = /*[[${chartType != null ? chartType : 'bar'}]]*/ 'bar';

        const chartConfig = {
            type: currentType,
            data: {
                labels: monthLabels.map(m => "Tháng " + m),
                datasets: [{
                    label: `Doanh thu theo tháng (VNĐ)`,
                    data: monthTotals,
                    borderColor: 'rgba(75, 192, 192, 1)',
                    backgroundColor: [
                        'rgba(54, 162, 235, 0.8)',
                        'rgba(255, 99, 132, 0.8)',
                        'rgba(255, 206, 86, 0.8)',
                        'rgba(75, 192, 192, 0.8)',
                        'rgba(153, 102, 255, 0.8)',
                        'rgba(255, 159, 64, 0.8)'
                    ],
                    borderWidth: 1,
                    tension: 0.3,
                    fill: true,
                    pointRadius: 4,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'top' },
                    title: { display: true, text: 'Tổng doanh thu theo tháng' }
                },
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: 'Doanh thu (VNĐ)' } },
                    x: { title: { display: true, text: 'Tháng' } }
                }
            }
        };

        let chart = new Chart(ctx, chartConfig);

        function changeChartType(type) {
            if (currentType === type) return;
            currentType = type;

            chart.destroy();
            chart = new Chart(ctx, {
                ...chartConfig,
                type: type,
                options: {
                    ...chartConfig.options,
                    scales: (type === 'pie') ? {} : chartConfig.options.scales
                }
            });
        }


        // ✅ Cập nhật biểu đồ khi đổi loại
        document.getElementById('chartType').addEventListener('change', (e) => {
            const newType = e.target.value;
            changeChartType(newType);
            updatePaginationLinks(); // cập nhật link phân trang theo chartType hiện tại
        });

        // ✅ Cập nhật link phân trang động theo loại biểu đồ hiện tại
        document.addEventListener("DOMContentLoaded", () => {
            updatePaginationLinks();
        });

        function updatePaginationLinks() {
            const chartType = document.getElementById("chartType").value;
            const links = document.querySelectorAll(".pagination a.page-link");

            links.forEach(link => {
                try {
                    const url = new URL(link.href, window.location.origin);
                    url.searchParams.set("chartType", chartType);
                    link.href = url.toString();
                } catch (e) {
                    console.warn("Invalid pagination link:", link.href);
                }
            });
        }
        /*]]>*/
    </script>
</th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
