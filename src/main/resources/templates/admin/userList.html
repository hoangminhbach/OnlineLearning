<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin_layout :: layout(pageTitle = ~{::title}, pageContent = ~{::.page-content-wrapper}, pageScripts = ~{::.page-scripts-wrapper})}">
<head><title>Quản lý Người dùng</title></head>
<body>
<div class="page-content-wrapper">
    <div class="container">
        <div class="header">
            <h1>Quản lý Người dùng</h1>
            <a th:href="@{/admin/users/create}" class="btn btn-primary">
                <span>+</span> Thêm người dùng mới
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="filters">
            <div class="filter-group">
                <label>Giới tính</label>
                <select id="genderFilter" onchange="applyFilters()">
                    <option value="ALL">Tất cả giới tính</option>
                    <option value="MALE">Nam</option>
                    <option value="FEMALE">Nữ</option>
                    <option value="OTHER">Khác</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Vai trò</label>
                <select id="roleFilter" onchange="applyFilters()">
                    <option value="ALL">Tất cả vai trò</option>
                    <option th:each="role : ${roles}" th:value="${role.name}" th:text="${role.name}"></option>
                </select>
            </div>
            <div class="filter-group">
                <label>Trạng thái</label>
                <select id="enabledFilter" onchange="applyFilters()">
                    <option value="ALL">Tất cả trạng thái</option>
                    <option value="true">Đang hoạt động</option>
                    <option value="false">Không hoạt động</option>
                </select>
            </div>
            <div class="filter-group search-box">
                <label>Tìm kiếm</label>
                <input type="text" id="searchInput" placeholder="Tìm theo tên, email hoặc số điện thoại..." th:value="${param.search}">
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Họ tên</th>
                        <th>Giới tính</th>
                        <th>Email</th>
                        <th>Số điện thoại</th>
                        <th>Vai trò</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users.content}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.fullName}"></td>
                        <td th:text="${user.gender != null ? user.gender.displayName : '-'}"></td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${user.mobile ?: 'N/A'}"></td>
                        <td th:text="${user.role != null ? user.role.name : '-'}"></td>
                        <td>
                            <span th:if="${user.enabled}" class="status-active">Đang hoạt động</span>
                            <span th:unless="${user.enabled}" class="status-inactive">Không hoạt động</span>
                        </td>
                        <td>
                            <div class="actions">
                                <a th:href="@{/admin/users/update/{id}(id=${user.id})}" class="btn btn-outline btn-sm">Sửa</a>
                                <a th:href="@{/admin/users/delete/{id}(id=${user.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc chắn muốn xóa người dùng này?')">Xóa</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${users.content == null || users.content.isEmpty()}">
                        <td colspan="8" class="no-data">Không tìm thấy người dùng nào</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${users.totalPages > 1}" class="pagination">
            <a th:each="pageNumber : ${pageNumbers}"
               th:href="@{/admin/users(page=${pageNumber - 1}, size=${users.size}, search=${param.search}, gender=${param.gender}, role=${param.role}, enabled=${param.enabled})}"
               th:text="${pageNumber}"
               th:class="${pageNumber == users.number + 1} ? 'active' : ''"></a>
        </div>
    </div>
</div>

<th:block class="page-scripts-wrapper">
<script>
function applyFilters() {
    const gender = document.getElementById('genderFilter').value;
    const role = document.getElementById('roleFilter').value;
    const enabled = document.getElementById('enabledFilter').value;
    const search = document.getElementById('searchInput').value;
    const urlParams = new URLSearchParams();
    if (gender !== 'ALL') urlParams.set('gender', gender);
    if (role !== 'ALL') urlParams.set('role', role);
    if (enabled !== 'ALL') urlParams.set('enabled', enabled);
    if (search) urlParams.set('search', search);
    window.location.href = '/admin/users?' + urlParams.toString();
}
document.getElementById('searchInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') applyFilters();
});
document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('gender')) document.getElementById('genderFilter').value = urlParams.get('gender');
    if (urlParams.get('role')) document.getElementById('roleFilter').value = urlParams.get('role');
    if (urlParams.get('enabled')) document.getElementById('enabledFilter').value = urlParams.get('enabled');
    if (urlParams.get('search')) document.getElementById('searchInput').value = urlParams.get('search');
});
</script>
</th:block>
</body>
</html>
