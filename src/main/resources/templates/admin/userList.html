<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin_layout :: layout(pageTitle = ~{::title}, pageContent = ~{::.page-content-wrapper}, pageScripts = ~{::.page-scripts-wrapper})}">
<head><title>Quản lý Người Dùng</title></head>
<body>
<div class="page-content-wrapper">
    <div class="container">
        <div class="header">
            <h1>Quản lý Người Dùng</h1>
            <a th:href="@{/admin/users/create}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Tạo Người Dùng
            </a>
        </div>

        <!-- Filters -->
        <form method="get" class="row g-3 mb-4">
            <div class="col-md-2">
                <select name="gender" class="form-select">
                    <option value="">Giới tính</option>
                    <option value="MALE">Nam</option>
                    <option value="FEMALE">Nữ</option>
                    <option value="OTHER">Khác</option>
                </select>
            </div>
            <div class="col-md-2">
                <select name="enabled" class="form-select">
                    <option value="">Trạng thái</option>
                    <option value="true">Hoạt động</option>
                    <option value="false">Bị khóa</option>
                </select>
            </div>
            <div class="col-md-3">
                <input type="text" name="search" class="form-control" placeholder="Tìm kiếm...">
            </div>
            <div class="col-md-2">
                <select name="sort" class="form-select">
                    <option value="id">Mặc định</option>
                    <option value="fullName">Tên A-Z</option>
                    <option value="email">Email</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-outline-primary w-100">Lọc</button>
            </div>
        </form>

        <!-- User Table -->
        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Họ tên</th>
                    <th>Giới tính</th>
                    <th>Vai trò</th>
                    <th>Trạng thái</th>
                    <th>Ngày tạo</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td th:text="${user.email}">email@example.com</td>
                    <td th:text="${user.fullName}">Nguyen Van A</td>
                    <td th:text="${user.gender != null ? user.gender.displayName : '-'}">Nam</td>
                    <td th:text="${user.role != null ? user.role.name : '-'}">ADMIN</td>
                    <td>
                        <span th:class="${user.enabled ? 'badge bg-success' : 'badge bg-danger'}"
                              th:text="${user.enabled ? 'Hoạt động' : 'Bị khóa'}">Hoạt động</span>
                    </td>
                    <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}">01/01/2024</td>
                    <td>
                        <a th:href="@{/admin/users/update/{id}(id=${user.id})}" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{/admin/users/delete/{id}(id=${user.id})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Bạn chắc chắn muốn xóa?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Pagination -->
        <nav th:if="${users.totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${users.first ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/admin/users(page=${currentPage - 1})}">Trước</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
                    th:classappend="${i == currentPage ? 'active' : ''}">
                    <a class="page-link" th:href="@{/admin/users(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${users.last ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/admin/users(page=${currentPage + 1})}">Sau</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
<th:block class="page-scripts-wrapper"></th:block>
</body>
</html>
