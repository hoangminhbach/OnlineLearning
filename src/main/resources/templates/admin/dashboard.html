<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin_layout :: layout(pageTitle = ~{::title}, pageContent = ~{::.page-content-wrapper}, pageScripts = ~{::.page-scripts-wrapper})}">
<head><title>Dashboard</title></head>
<body>
<div class="page-content-wrapper content-area">
    <div class="container">
        <div class="header">
            <h1>Dashboard</h1>
        </div>

        <!-- Stats Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="p-4 rounded" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    <h3>Tổng Người Dùng</h3>
                    <h2 th:text="${totalUsers}">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="p-4 rounded" style="background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%); color: white;">
                    <h3>Tổng Khóa Học</h3>
                    <h2 th:text="${totalCourses}">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="p-4 rounded" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white;">
                    <h3>Tổng Đơn Hàng</h3>
                    <h2 th:text="${totalOrders}">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="p-4 rounded" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: white;">
                    <h3>Tổng Doanh Thu</h3>
                    <h2 th:text="${totalRevenue}">0</h2>
                </div>
            </div>
        </div>

        <div class="alert alert-info">Chào mừng bạn đến với trang quản trị!</div>
    </div>
</div>
<th:block class="page-scripts-wrapper"></th:block>
</body>
</html>
