<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" th:href="@{/css/authen.css}">
</head>
<body>
<div class="form-container">
    <div class="form-header">
        <h1>Chào mừng trở lại</h1>
        <p>Đăng nhập vào tài khoản của bạn</p>
    </div>

    <div th:if="${param.error}" class="alert error" th:text="${param.error}"></div>
    <div th:if="${param.logout}" class="alert success">Bạn đã đăng xuất thành công</div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="text" name="email" class="input-field" placeholder="Nhập địa chỉ email" required/>
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" name="password" class="input-field" placeholder="Nhập mật khẩu" required/>
        </div>
        <button type="submit" class="submit-btn">Đăng nhập</button>
    </form>

    <div class="form-footer">
        <a th:href="@{/register}">Tạo tài khoản mới</a>
        <a th:href="@{/forgotPassword}">Quên mật khẩu?</a>
    </div>
</div>
</body>
</html>
