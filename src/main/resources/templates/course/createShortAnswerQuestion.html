<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tạo câu hỏi trả lời ngắn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4f46e5;
            --danger-color: #dc2626;
            --success-color: #16a34a;
            --border-color: #d1d5db;
            --background-color: #f9fafb;
            --text-color: #111827;
            --label-color: #374151;
            --placeholder-color: #9ca3af;
            --card-background: #ffffff;
            --border-radius: 8px;
            --box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        /* ... Dán toàn bộ CSS từ file trên vào đây ... */
        body { font-family: 'Inter', sans-serif; background-color: var(--background-color); color: var(--text-color); margin: 0; padding: 2rem; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .container { width: 100%; max-width: 800px; }
        .card { background-color: var(--card-background); border-radius: var(--border-radius); box-shadow: var(--box-shadow); padding: 2rem; }
        .card-header { margin-bottom: 2rem; text-align: center; color: var(--text-color); }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--label-color); }
        input[type="text"], textarea, select, input[type="file"] { width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--border-radius); box-sizing: border-box; transition: border-color 0.2s, box-shadow 0.2s; }
        input[type="file"] { padding: 0.5rem; }
        input[type="text"]:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2); }
        .error-message { color: var(--danger-color); font-size: 0.875rem; margin-top: 0.25rem; }
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: var(--border-radius); font-weight: 600; cursor: pointer; transition: background-color 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: #4338ca; }
        .alert { padding: 1rem; margin-bottom: 1.5rem; border-radius: var(--border-radius); border: 1px solid transparent; }
        .alert-success { background-color: #dcfce7; color: #14532d; border-color: #bbf7d0; }
        .alert-danger { background-color: #fee2e2; color: #991b1b; border-color: #fecaca; }
        .alert ul { margin: 0; padding-left: 1.2rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1 class="card-header" th:text="${isUpdate ? pageTitle : 'Tạo câu hỏi trả lời ngắn'}">Tạo câu hỏi trả lời ngắn</h1>
        <form th:action="${isUpdate}
                        ? @{/courses/{courseId}/quizzes/{quizId}/questions/{questionId}/short-answer/update(courseId=${courseId}, quizId=${quiz.id}, questionId=${questionId})}
                        : @{/courses/{courseId}/quizzes/{quizId}/questions/short-answer/create(courseId=${courseId}, quizId=${quiz.id})}"
              th:object="${shortAnswerQuestionFormDTO}" method="post" enctype="multipart/form-data">
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                <ul><li th:each="err : ${#fields.globalErrors()}" th:text="${err}"></li></ul>
            </div>

            <div class="form-group">
                <label for="content">Nội dung câu hỏi:</label>
                <textarea id="content" th:field="*{content}" rows="4" required></textarea>
                <span th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="mediaType">Loại Media:</label>
                <select id="mediaType" th:field="*{mediaType}" onchange="showUploadMedia()">
                    <option th:each="type : ${mediaTypes}" th:value="${type}" th:text="${type}"></option>
                </select>
            </div>

            <div class="form-group" id="media-upload">
                <label for="media">Tải lên Media (nếu có):</label>
                <input type="file" id="media" th:field="*{media}">
            </div>

            <hr style="margin: 2rem 0;">
            <div class="form-group">
                <label for="solutionText">Đáp án đúng:</label>
                <input type="text" id="solutionText" th:field="*{solutionText}" required>
                <span th:if="${#fields.hasErrors('solutionText')}" th:errors="*{solutionText}" class="error-message"></span>
            </div>

            <div style="display: flex; justify-content: space-between; margin-top: 2rem;">
                <button class="btn btn-primary"><a th:href="@{/courses/{courseId}/quizzes/{quizId}/questions(courseId=${courseId},quizId=${quiz.id})}" style="color: white">Trở về</a></button>
                <button type="submit" class="btn btn-primary">Lưu câu hỏi</button>
            </div>
        </form>
    </div>
</div>

<script>
    function showUploadMedia() {
        const mediaType = document.getElementById('mediaType').value;
        document.getElementById('media-upload').style.display = (mediaType === 'NONE') ? 'none' : 'block';
    }

    document.addEventListener('DOMContentLoaded', showUploadMedia);
</script>

</body>
</html>
