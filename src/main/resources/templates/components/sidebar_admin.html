<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="sidebar" class="d-flex flex-column flex-shrink-0 p-3 text-bg-dark" style="width: 280px; height: 100vh;">
    <a th:href="@{/admin}" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
        <i class="bi bi-shield-lock-fill me-2" style="font-size: 1.5rem;"></i>
        <span class="fs-4">Admin Panel</span>
    </a>
    <hr>
    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
            <a th:href="@{/admin}" class="nav-link text-white"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        </li>
        <li>
            <a th:href="@{/admin/users}" class="nav-link text-white"><i class="bi bi-person-circle me-2"></i>Quản lý Người Dùng</a>
        </li>
        <li>
            <a th:href="@{/courses/admin}" class="nav-link text-white"><i class="bi bi-grid me-2"></i>Quản lý Khóa Học</a>
        </li>
        <li>
            <a th:href="@{/admin/orders}" class="nav-link text-white"><i class="bi bi-table me-2"></i>Quản lý Đơn Đăng Kí</a>
        </li>
        <li>
            <a th:href="@{/admin/course_categories}" class="nav-link text-white"><i class="bi bi-folder me-2"></i>Quản lý Danh Mục</a>
        </li>
        <li>
            <a th:href="@{/admin/sliders}" class="nav-link text-white"><i class="bi bi-image me-2"></i>Quản lý Slide</a>
        </li>
    </ul>
    <hr>
    <div class="dropdown">
        <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">
            <img src="https://github.com/mdo.png" alt="" width="32" height="32" class="rounded-circle me-2">
            <strong th:if="${currentUser != null}" th:text="${currentUser.fullName}">Admin</strong>
            <strong th:unless="${currentUser != null}">Admin</strong>
        </a>
        <ul class="dropdown-menu dropdown-menu-dark text-small shadow">
            <li><a class="dropdown-item" th:href="@{/logout}">Đăng xuất</a></li>
        </ul>
    </div>
</div>
</body>
</html>
