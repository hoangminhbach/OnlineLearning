<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quiz Progress</title>
    <style>
        :root {
            --primary-color: #6c63ff;
            --primary-hover: #5a54d6;
            --secondary-color: #4ecdc4;
            --text-color: #333;
            --text-light: #666;
            --bg-color: #fff;
            --bg-light: #f8f9fa;
            --border-color: #e9ecef;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius: 12px;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-color);
            margin: 0;
            padding: 40px 0;
        }

        .progress-wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 30px 40px;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 25px;
        }

        /* Timer section */
        .timer-box {
            background: var(--bg-light);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
        }

        #timer {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        #message {
            color: #c0392b;
            font-weight: 500;
        }

        /* Grid of question buttons */
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .question-btn {
            padding: 14px;
            text-align: center;
            border-radius: var(--radius);
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            color: var(--text-color);
            border: 2px solid var(--border-color);
            background-color: var(--bg-light);
            transition: all 0.25s ease;
            box-shadow: var(--shadow);
        }

        .question-btn:hover {
            border-color: var(--primary-hover);
            color: var(--primary-hover);
        }

        .answered {
            background-color: #e9fbee;
            border-color: #16a34a;
            color: #0f5132;
        }



        .unanswered {
            background-color: #f8f9fa;
            color: var(--text-light);
        }

        .bookmarked {
            border-color: #ffd54f;
            box-shadow: 0 0 0 3px rgba(255, 213, 79, 0.4);
            background-color: #fff8e1;
        }

        /* Legend */
        .legend {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .legend span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
        }

        .legend .answered {
            background-color: #e9fbee;
            border: 1px solid #16a34a;
        }

        .legend .bookmarked {
            background-color: #fff8e1;
            border: 1px solid #ffd54f;
        }

        .legend .unanswered {
            background-color: #f1f3f5;
            border: 1px solid #d6d8db;
        }

        /* Buttons */
        .action-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn {
            padding: 10px 22px;
            border-radius: var(--radius);
            font-weight: 600;
            text-decoration: none;
            border: 2px solid var(--primary-color);
            background-color: var(--primary-color);
            color: #fff;
            box-shadow: var(--shadow);
            transition: all 0.25s ease;
        }

        .btn:hover {
            background-color: #fff;
            color: var(--primary-color);
        }

        /* Progress bar */
        .progress-container {
            width: 100%;
            height: 14px;
            background-color: #e9ecef;
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 25px;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--secondary-color);
            width: 0%;
            transition: width 0.4s ease;
        }
    </style>
</head>

<body>
<div class="progress-wrapper">
    <h2>Quiz Progress</h2>

    <!-- Timer -->
    <div class="timer-box">
        <div><strong>⏳ Time left:</strong> <span id="timer">00:00</span></div>
        <div id="message"></div>
    </div>


    <!-- Questions -->
    <div class="question-grid">
        <a th:each="q, iter : ${questions}"
           th:href="@{'/quiz/' + ${quizId} + '/' + ${iter.index}}"
           th:class="${'question-btn ' +
              ((#maps.containsKey(answers, q.id) and not answers[q.id].answer.isEmpty) ? 'answered ' : 'unanswered ') +
              ((#maps.containsKey(answers, q.id) and answers[q.id].bookmarked) ? 'bookmarked' : '')}"
           th:text="'Q' + ${iter.index + 1}">
        </a>
    </div>

    <!-- Legend -->
    <div class="legend">
        <span class="answered">✅ Answered</span>
        <span class="bookmarked">⭐ Bookmarked</span>
        <span class="unanswered">⬜ Unanswered</span>
    </div>

    <!-- Buttons -->
    <div class="action-buttons">
        <button class="btn" type="button" onclick="history.back()">⬅ Back</button>
        <a class="btn" th:href="@{'/quiz/'+${quizId}+'/result'}">Finish</a>
    </div>
</div>

<script th:inline="javascript">
    const endTimeStr = /*[[${endTime}]]*/ '';
    const endTime = new Date(endTimeStr.replace(' ', 'T'));
    const timerEl = document.getElementById('timer');
    const msgEl = document.getElementById('message');
    const totalDuration = endTime - new Date();

    function updateTimer() {
        const now = new Date();
        const diffMs = endTime - now;
        const diffSec = Math.floor(diffMs / 1000);
        if (diffSec <= 10) msgEl.textContent = '⚠️ 10 seconds remaining!';
        if (diffSec <= 0) {
            msgEl.textContent = '⏰ Time’s up!';
            clearInterval(timerInterval);
            window.location.href = "result";
            return;
        }

        const minutes = Math.floor(diffSec / 60);
        const seconds = diffSec % 60;
        timerEl.textContent = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;

    }

    updateTimer();
    const timerInterval = setInterval(updateTimer, 1000);
</script>
</body>
</html>
