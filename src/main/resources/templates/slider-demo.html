<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slider Demo - Online English Learning System</title>
    <link rel="stylesheet" th:href="@{/css/slider.css}">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
        }

        .demo-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .demo-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .demo-header h1 {
            color: #6c63ff;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .demo-header p {
            color: #666;
            font-size: 16px;
        }

        .demo-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .demo-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .feature-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .feature-item {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #6c63ff;
        }

        .feature-item h3 {
            color: #6c63ff;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .feature-item p {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .admin-link {
            text-align: center;
            margin-top: 30px;
        }

        .admin-link a {
            display: inline-block;
            background: #6c63ff;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .admin-link a:hover {
            background: #5a54d6;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<div class="demo-container">
    <div class="demo-header">
        <h1>🎠 Slider Demo</h1>
        <p>Hệ thống quản lý slider cho Online English Learning System</p>
    </div>

    <!-- Slider Component -->
    <div class="demo-section">
        <h2>Slider Hiển thị</h2>
        <div th:replace="components/slider :: slider-container"></div>
    </div>
