<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|${blog.title} - OELS|">Chi tiết Bài viết</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #0ea5e9;
            --text-main: #0f172a;
            --text-muted: #475569;
            --text-light: #94a3b8;
            --bg-body: #ffffff;
            --bg-surface: #f8fafc;
            --border: #e2e8f0;
            --radius-md: 12px;
            --radius-lg: 24px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); line-height: 1.6; }
        a { text-decoration: none; color: inherit; transition: color 0.2s; }
        .container { max-width: 1024px; margin: 0 auto; padding: 0 1.5rem; }
        
        /* Back Navigation */
        .back-nav { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); font-weight: 500; font-size: 0.95rem; margin-top: 3rem; margin-bottom: 2rem; transition: color 0.2s; }
        .back-nav:hover { color: var(--primary); }
        .back-nav i { font-size: 0.85rem; }

        /* Article Hero */
        .article-header { text-align: center; max-width: 800px; margin: 0 auto 3rem; }
        .badge { display: inline-block; padding: 0.4rem 0.8rem; background: #dbeafe; color: var(--primary); border-radius: 6px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.5rem; }
        .article-title { font-size: 3rem; font-weight: 800; line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 1.5rem; color: var(--text-main); }
        .article-subtitle { font-size: 1.25rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 2rem; }
        
        /* Meta row */
        .article-meta { display: flex; align-items: center; justify-content: center; gap: 1.5rem; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 1.5rem 0; color: var(--text-muted); font-size: 0.95rem; flex-wrap: wrap; }
        .author-info { display: flex; align-items: center; gap: 0.75rem; font-weight: 600; color: var(--text-main); }
        .author-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .meta-item { display: flex; align-items: center; gap: 0.5rem; }
        
        /* Hero Image */
        .hero-image { width: 100%; border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 4rem; box-shadow: var(--shadow-md); }
        .hero-image img { width: 100%; max-height: 500px; object-fit: cover; display: block; }

        /* Article Body (Editorial Typography) */
        .article-body { max-width: 720px; margin: 0 auto 6rem; font-size: 1.15rem; line-height: 1.8; color: #1e293b; }
        
        /* Typography System */
        .article-body p { margin-bottom: 1.75rem; }
        .article-body h2 { font-size: 1.75rem; font-weight: 800; margin: 3rem 0 1.5rem; color: var(--text-main); letter-spacing: -0.01em; }
        .article-body h3 { font-size: 1.35rem; font-weight: 700; margin: 2rem 0 1rem; color: var(--text-main); }
        .article-body blockquote { font-style: italic; font-size: 1.35rem; border-left: 4px solid var(--primary); padding: 1rem 0 1rem 1.5rem; margin: 2.5rem 0; color: var(--text-muted); background: var(--bg-surface); border-radius: 0 var(--radius-md) var(--radius-md) 0; }
        .article-body ul, .article-body ol { margin-bottom: 2rem; padding-left: 1.5rem; }
        .article-body li { margin-bottom: 0.75rem; }
        .article-body li::marker { color: var(--primary); font-weight: 600; }
        .article-body a { color: var(--primary); font-weight: 500; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }
        .article-body a:hover { color: var(--primary-hover); text-decoration-thickness: 2px; }
        .article-body img { max-width: 100%; border-radius: var(--radius-md); margin: 2.5rem 0; box-shadow: var(--shadow-sm); display: block; }
        
        /* Closing Navigation */
        .article-footer { max-width: 720px; margin: 0 auto 6rem; padding-top: 2rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .footer-cta { display: inline-flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; background: var(--bg-surface); color: var(--text-main); transition: background 0.2s; border: 1px solid var(--border); }
        .footer-cta:hover { background: #e2e8f0; }

        @media (max-width: 768px) {
            .article-title { font-size: 2.25rem; }
            .article-meta { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .hero-image img { max-height: 300px; }
            .article-body { font-size: 1.1rem; }
        }
    </style>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>
<body>

<!-- Header -->
<div th:replace="~{components/header :: header}"></div>

<div class="container">
    <!-- Breadcrumb / Back Navigation -->
    <a th:href="@{${blog.categorySlug != null ? '/blogs?categorySlug=' + blog.categorySlug : '/blogs'}}" class="back-nav">
        <i class="fas fa-arrow-left"></i>
        <span>Quay lại <th:block th:text="${blog.categoryName != null ? blog.categoryName : 'Danh sách bài viết'}"></th:block></span>
    </a>

    <!-- Article Hero -->
    <header class="article-header">
        <a th:if="${blog.categorySlug != null}" th:href="@{/blogs(categorySlug=${blog.categorySlug})}" class="badge" th:text="${blog.categoryName}">Danh mục</a>
        <span th:if="${blog.categorySlug == null && blog.categoryName != null}" class="badge" th:text="${blog.categoryName}">Danh mục</span>
        
        <h1 class="article-title" th:text="${blog.title}">Tiêu đề bài viết</h1>
        
        <p class="article-subtitle" th:if="${blog.shortDescription != null && !blog.shortDescription.isEmpty()}" th:text="${blog.shortDescription}">
            Mô tả ngắn gọn của bài viết.
        </p>

        <div class="article-meta">
            <div class="author-info">
                <img th:if="${blog.authorAvatarUrl != null}" th:src="${blog.authorAvatarUrl.startsWith('http') ? blog.authorAvatarUrl : '/uploads/' + blog.authorAvatarUrl}" class="author-avatar" alt="Avatar">
                <img th:if="${blog.authorAvatarUrl == null}" src="/images/default-avatar.png" class="author-avatar" alt="Avatar">
                <span th:text="${blog.authorName}">Tên Tác Giả</span>
            </div>
            
            <div class="meta-item">
                <i class="far fa-calendar-alt"></i>
                <span th:text="${#temporals.format(blog.createdAt, 'dd/MM/yyyy')}">01/01/2026</span>
            </div>
            
            <div class="meta-item" th:if="${blog.updatedAt != null && blog.updatedAt != blog.createdAt}">
                <i class="fas fa-history"></i>
                <span>Cập nhật: <th:block th:text="${#temporals.format(blog.updatedAt, 'dd/MM/yyyy')}"></th:block></span>
            </div>
        </div>
    </header>

    <!-- Thumbnail (if available) -->
    <div class="hero-image" th:if="${blog.thumbnail != null}">
        <img th:src="${blog.thumbnail.startsWith('http') ? blog.thumbnail : '/uploads/' + blog.thumbnail}" alt="Blog Thumbnail">
    </div>

    <!-- Article Content -->
    <main class="article-body" th:utext="${blog.formattedContent}">
        <p>Nội dung bài viết sẽ được hiển thị ở đây.</p>
    </main>

    <!-- Article Footer / CTA -->
    <footer class="article-footer">
        <a th:href="@{/blogs}" class="footer-cta">
            <i class="fas fa-list-ul"></i>
            Xem tất cả bài viết
        </a>
    </footer>
</div>

<!-- Footer -->
<div th:replace="~{components/footer :: footer}"></div>

</body>
</html>
