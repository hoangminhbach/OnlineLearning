<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận Thanh toán</title>
    <style>
        body { font-family: Arial, sans-serif; display: grid; place-items: center; min-height: 80vh; background-color: #f4f4f4; }
        .container {
            width: 600px;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background-color: #fff;
        }
        h2 { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 1.1em; }
        .summary-item .label { color: #555; }
        .summary-item .value { font-weight: bold; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .total { font-size: 1.4em; font-weight: bold; color: #dc3545; }
        .btn-submit {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-submit:hover { background-color: #218838; }
        .cancel-link { display: block; text-align: center; margin-top: 15px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>Xác nhận Đơn hàng</h2>

    <div class="summary">
        <div class="summary-item">
            <span class="label">Khóa học:</span>
            <span class="value" th:text="${course.name}">Tên khóa học</span>
        </div>
        <div class="summary-item">
            <span class="label">Giá gốc:</span>
            <span class="value" th:text="${#numbers.formatDecimal(course.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">1,000,000 VNĐ</span>
        </div>
        <div class="summary-item">
            <span class="label">Giảm giá:</span>
            <span class="value" th:text="${course.discount} + '%'">10%</span>
        </div>

        <hr>

        <div class="summary-item total">
            <span class="label">Tổng cộng:</span>
            <span class="value" th:text="${#numbers.formatDecimal(finalPrice, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">900,000 VNĐ</span>
        </div>
    </div>

    <form th:action="@{/payment/create-vnpay-order}" method="post">
        <input type="hidden" name="courseId" th:value="${course.id}">
        <button type="submit" class="btn-submit">Xác nhận & Thanh toán VNPAY</button>
    </form>

    <a th:href="@{/courses/{id}/learner(id=${course.id})}" class="cancel-link">Hủy và quay lại</a>
</div>

</body>
</html>
