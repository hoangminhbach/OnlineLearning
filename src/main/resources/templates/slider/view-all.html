<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem Tất Cả Slider - OELS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6c63ff;
            --primary-hover: #5a54d6;
            --secondary-color: #4ecdc4;
            --text-color: #333;
            --text-light: #666;
            --bg-color: #fff;
            --bg-light: #f8f9fa;
            --border-color: #e9ecef;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-light);
        }

        /* Header */
        .header {
            background: var(--bg-color);
            box-shadow: var(--shadow);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
        }

        .nav-breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-light);
        }

        .nav-breadcrumb a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .nav-breadcrumb a:hover {
            text-decoration: underline;
        }

        .back-btn {
            background: var(--primary-color);
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.3s ease;
        }

        .back-btn:hover {
            background: var(--primary-hover);
        }

        /* Main Content */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-title {
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 1rem;
        }

        .page-subtitle {
            font-size: 1.2rem;
            color: var(--text-light);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Slider Gallery */
        .sliders-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .slider-card {
            background: var(--bg-color);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .slider-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .slider-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .slider-content {
            padding: 2rem;
        }

        .slider-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: var(--text-color);
        }

        .slider-description {
            color: var(--text-light);
            font-size: 1rem;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .slider-meta {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: var(--bg-light);
            border-radius: 8px;
            text-align: center;
        }

        .slider-order {
            color: var(--text-light);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .slider-date {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .slider-views {
            color: var(--primary-color);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .slider-link {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s ease;
            width: 100%;
            text-align: center;
        }

        .slider-link:hover {
            background: var(--primary-hover);
        }

        .slider-link:not([href]) {
            background: var(--border-color);
            color: var(--text-light);
            cursor: not-allowed;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: var(--border-color);
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .page-title {
                font-size: 2rem;
            }

            .sliders-gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>
<body>
<!-- Header -->
<div th:replace="~{components/header :: header}"></div>

<!-- Main Content -->
<div class="container">
    <!-- Page Header -->
    <div class="page-header">
        <h1 class="page-title">🎠 Tất Cả Slider</h1>
        <p class="page-subtitle">Khám phá tất cả các slider đang được hiển thị trên trang chủ của chúng tôi</p>
    </div>

    <!-- Sliders Gallery -->
    <div th:if="${sliders != null and !sliders.empty}" class="sliders-gallery">
        <div th:each="slider : ${sliders}" class="slider-card">
            <img th:src="${slider.imageUrl}" th:alt="${slider.title}" class="slider-image">
            <div class="slider-content">
                <h3 class="slider-title" th:text="${slider.title}">Slider Title</h3>
                <p class="slider-description" th:text="${slider.description}">Slider description goes here...</p>
                <div class="slider-meta">
                    <span class="slider-order" th:text="'Thứ tự: ' + ${slider.orderNumber}">Order</span>
                    <span class="slider-date" th:text="${#temporals.format(slider.createdAt, 'dd/MM/yyyy')}">Date</span>
                    <span class="slider-views" th:text="'👁️ ' + ${slider.viewCount} + ' lượt xem'">Views</span>
                </div>
                <a th:if="${slider.linkUrl}"
                   th:href="${slider.linkUrl}"
                   class="slider-link"
                   target="_blank">
                    <i class="fas fa-external-link-alt"></i> Xem chi tiết
                </a>
                <span th:unless="${slider.linkUrl}" class="slider-link">
                        <i class="fas fa-info-circle"></i> Không có link
                    </span>
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${sliders == null or sliders.empty}" class="empty-state">
        <i class="fas fa-images"></i>
        <h3>Chưa có slider nào</h3>
        <p>Hiện tại chưa có slider nào được hiển thị</p>
    </div>
</div>

<!-- Footer -->
<div th:replace="~{components/footer :: footer}"></div>
</body>
</html>
