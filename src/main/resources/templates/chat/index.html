<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Danh sách hội thoại</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .chat-list-container {
            max-width: 700px;
            margin: 50px auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            transition: background-color 0.2s ease;
            text-decoration: none;
            color: inherit;
        }

        .chat-item:hover {
            background-color: #f1f3f5;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            margin-right: 15px;
            background-color: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #6c757d;
        }

        .chat-info {
            flex-grow: 1;
        }

        .chat-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .chat-meta {
            font-size: 0.9rem;
            color: #6c757d;
        }

        .create-btn {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="chat-list-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="fw-bold">Danh sách hội thoại</h2>
        <a class="btn btn-success create-btn" th:href="@{/chats/create-group}" sec:authorize="hasRole('ROLE_ADMIN')">
            <i class="fa-solid fa-plus"></i> Tạo nhóm mới
        </a>
    </div>

    <div th:each="c : ${chats}">
        <a class="chat-item" th:href="@{'/chats/group/' + ${c.id}}">
            <div class="chat-avatar">
                <!-- Nếu có avatar thì hiển thị ảnh -->
                <img th:if="${c.avatar != null}" th:src="@{'/uploads/' + ${c.avatar}}" alt="avatar"
                     style="width: 100%; height: 100%; object-fit: cover;">
                <!-- Nếu không có thì hiển thị icon -->
                <i th:if="${c.avatar == null}"
                   th:classappend="${c.type.name() == 'GROUP'} ? 'fa-solid fa-users' : 'fa-solid fa-user'"></i>
            </div>

            <div class="chat-info">
                <div class="chat-name" th:text="${c.name}">
                    Tên hội thoại
                </div>
                <div class="chat-meta">
                    <span th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                    <span th:if="${c.type.name() == 'GROUP'}">• Nhóm</span>
                    <span th:if="${c.type.name() == 'PRIVATE'}">• Riêng tư</span>
                </div>
            </div>
        </a>
    </div>
</div>

</body>
</html>
