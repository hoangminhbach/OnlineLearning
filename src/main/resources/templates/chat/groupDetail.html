<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin nhóm chat</title>
    <link rel="stylesheet" th:href="@{/css/userProfile.css}">
</head>
<style>
    .toggle-members-btn {
        padding: 6px 12px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-bottom: 8px;
    }

    .toggle-members-btn:hover {
        background: #2980b9;
    }

    .member-list.hidden {
        display: none;
    }

    .member-list li {
        margin: 6px 0;
    }

    .member-role {
        color: #777;
        font-size: 0.9em;
        margin-left: 4px;
    }

</style>
<body>

<!-- Header -->
<div th:replace="~{components/header :: header}"></div>

<!-- Nội dung chính -->
<div class="container">
    <div class="profile-card">

        <!-- Avatar + Tên nhóm -->
        <div class="profile-header">
            <div class="profile-avatar">
                <img th:if="${chat.avatar != null}" th:src="@{'/uploads/' + ${chat.avatar}}" alt="Avatar nhóm">
                <img th:if="${chat.avatar == null}" src="/images/default-group.png" alt="Avatar mặc định">
            </div>
            <div class="profile-meta">
                <h2 th:text="${chat.name}">Tên nhóm</h2>
                <p>
                    Ngày tạo nhóm:
                    <span th:text="${#temporals.format(chat.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                </p>
            </div>
        </div>

        <!-- Thông tin chi tiết -->
        <div class="profile-info">
            <dl>
                <div class="info-row">
                    <dt>Mô tả nhóm:</dt>
                    <dd th:text="${chat.description}">Không có mô tả</dd>
                </div>

                <div class="info-row">
                    <dt>Loại nhóm:</dt>
                    <dd th:text="${chat.type}">GROUP</dd>
                </div>

                <div class="info-row">
                    <dt>Thành viên:</dt>
                    <dd>

                        <!-- Nút mở rộng -->
                        <button type="button" class="toggle-members-btn" onclick="toggleMembers()">
                            Xem danh sách thành viên
                        </button>

                        <!-- Danh sách thành viên -->
                        <ul id="memberList" class="member-list hidden">
                            <li th:each="member : ${chat.members}">
                                <a th:href="@{'/chats/private/' + ${member.user.id}}">
                                    <span th:text="${member.user.fullName}"></span>
                                </a>

                                <!-- Hiển thị role -->
                                <span class="member-role"
                                      th:text="${member.role.name()}">}">
                </span>
                            </li>
                        </ul>

                    </dd>
                </div>

            </dl>
        </div>

        <!-- Action -->
        <div class="action-buttons">
            <a th:if="${chat.type.name()!='PRIVATE'}" th:href="@{'/chats/group/' + ${chat.id} +'/out'}" class="btn btn-danger">Rời nhóm</a>
            <a th:href="@{'/chats/group/' + ${chat.id} +'/edit'}" class="btn btn-secondary">Chỉnh sửa nhóm</a>
            <a th:href="@{'/chats/'}" class="btn btn-primary">Quay về danh sách nhóm</a>
        </div>
    </div>
</div>
<script>
    function toggleMembers() {
        const list = document.getElementById("memberList");
        list.classList.toggle("hidden");
    }
</script>

<!-- Footer -->
<div th:replace="~{components/footer :: footer}"></div>

</body>
</html>
