<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Add member</title>
</head>
<body>

<div class="container">
    <div class="profile-card">
        <div class="mb-3">
            <form th:action="${'/chats/'+chatId+'/invite'}" method="post">
                <label class="form-label">Chọn thành viên</label>
                <div class="border rounded p-3" style="max-height: 250px; overflow-y: auto;">
                    <div th:each="user : ${users}" class="form-check">
                        <input class="form-check-input" type="checkbox"
                               th:name="selectedUserIds"
                               th:value="${user.id}"
                               th:id="${'user_' + user.id}"
                               th:checked="${chatMembers.contains(user)}">
                        <label class="form-check-label" th:for="${'user_' + user.id}" th:text="${user.fullName}">Tên người dùng</label>
                    </div>
                </div>
                <input type="hidden" name="chatId" th:value="${chatId}">
                <input type="submit" class="btn-primary" value="submit">
            </form>
        </div>
    </div>
</div>

</body>
</html>
