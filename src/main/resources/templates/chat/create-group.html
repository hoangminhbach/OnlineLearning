<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo nhóm chat mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2 class="mb-4">Tạo nhóm chat mới</h2>

<form th:action="@{/chats/create-group}" th:object="${chat}" method="post" enctype="multipart/form-data">

    <!-- Loại chat: GROUP (ẩn) -->
    <input type="hidden" th:field="*{type}" value="GROUP"/>

    <!-- Tên nhóm -->
    <div class="mb-3">
        <label for="name" class="form-label">Tên nhóm</label>
        <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập tên nhóm..." required>
    </div>

    <!-- Mô tả nhóm -->
    <div class="mb-3">
        <label for="description" class="form-label">Mô tả</label>
        <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Thêm mô tả ngắn..."></textarea>
    </div>

    <!-- Ảnh đại diện -->
    <div class="mb-3">
        <label class="form-label">Ảnh đại diện nhóm</label>
        <input type="file" name="avatarFile" class="form-control" accept="image/*">
    </div>

    <!-- Danh sách người dùng để chọn thành viên -->
    <div class="mb-3">
        <label class="form-label">Chọn thành viên</label>
        <div class="border rounded p-3" style="max-height: 250px; overflow-y: auto;">
            <div th:each="user : ${users}" class="form-check">
                <input class="form-check-input" type="checkbox"
                       th:name="selectedUserIds"
                       th:value="${user.id}"
                       th:id="${'user_' + user.id}">
                <label class="form-check-label" th:for="${'user_' + user.id}" th:text="${user.fullName}">Tên người dùng</label>
            </div>
        </div>
    </div>

    <!-- Nút tạo nhóm -->
    <button type="submit" class="btn btn-primary">Tạo nhóm</button>
    <a href="/chats/" class="btn btn-secondary">Hủy</a>
</form>

</body>
</html>
