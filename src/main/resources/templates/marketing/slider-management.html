<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Slider | Marketing Dashboard</title>
    <!-- Premium Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" th:href="@{/css/marketing-dashboard.css}">
    <style>
        .filter-form {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--color-surface);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-diffusion);
            align-items: flex-end;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-text-muted);
        }

        .form-control {
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-bg);
            color: var(--color-text-main);
            font-family: inherit;
            font-size: 1rem;
            transition: all var(--transition-fast);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px var(--color-accent-light);
        }

        .btn-filter {
            padding: 0.75rem 1.5rem;
            background: var(--color-text-main);
            color: var(--color-surface);
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all var(--transition-fast);
        }

        .btn-filter:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-create {
            padding: 0.75rem 1.5rem;
            background: var(--color-accent);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all var(--transition-fast);
        }

        .btn-create:hover {
            background: var(--color-accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .blog-table-container {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-diffusion);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--color-bg);
            padding: 1rem 1.5rem;
            text-align: left;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-text-muted);
            border-bottom: 1px solid var(--color-border);
        }

        td {
            padding: 1.5rem;
            border-bottom: 1px solid var(--color-border);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: var(--color-surface-hover);
        }

        .slider-thumb {
            width: 120px;
            height: 60px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
        }

        .slider-title {
            font-weight: 600;
            color: var(--color-text-main);
            margin-bottom: 0.25rem;
        }

        .slider-link {
            font-size: 0.875rem;
            color: var(--color-text-muted);
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-block;
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            transition: all var(--transition-fast);
            color: var(--color-surface);
            text-decoration: none;
        }

        .btn-edit { background: var(--color-accent); }
        .btn-edit:hover { background: var(--color-accent-hover); transform: translateY(-1px); }

        .btn-send { background: #f59e0b; }
        .btn-send:hover { background: #d97706; transform: translateY(-1px); }

        .btn-delete { background: #ef4444; }
        .btn-delete:hover { background: #dc2626; transform: translateY(-1px); }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .page-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text-main);
            text-decoration: none;
            font-weight: 500;
            transition: all var(--transition-fast);
        }

        .page-link:hover {
            background: var(--color-surface-hover);
            border-color: var(--color-text-muted);
        }

        .page-link.active {
            background: var(--color-text-main);
            color: var(--color-surface);
            border-color: var(--color-text-main);
        }

        .page-link.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .alert {
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">OELS</div>
        <nav class="sidebar-nav">
            <a th:href="@{/marketing}" class="nav-item">
                <i class="ph ph-squares-four"></i> Dashboard
            </a>
            <a th:href="@{/marketing/sliders}" class="nav-item active">
                <i class="ph-fill ph-image"></i> Quản lý Slider
            </a>
            <a th:href="@{/marketing/blogs}" class="nav-item">
                <i class="ph ph-article"></i> Quản lý Blog
            </a>
        </nav>
    </div>

    <div class="main-content">
        <header class="nav-header">
            <div class="brand">
                <i class="ph-fill ph-image"></i>
                <span>Danh sách Slider</span>
            </div>
            
            <div class="user-module" th:if="${currentUser != null}">
                <div class="user-avatar" th:text="${#strings.substring(currentUser.fullName, 0, 1)}">U</div>
                <span class="font-medium" th:text="${currentUser.fullName}">User</span>
                <form th:action="@{/logout}" method="post" style="margin:0;">
                    <button type="submit" class="logout-btn" title="Đăng xuất">
                        <i class="ph ph-sign-out"></i>
                    </button>
                </form>
            </div>
        </header>

        <!-- Flash Messages -->
        <div th:if="${success}" class="alert alert-success">
            <i class="ph ph-check-circle" style="font-size: 1.25rem;"></i>
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-error">
            <i class="ph ph-warning-circle" style="font-size: 1.25rem;"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Filters -->
        <form th:action="@{/marketing/sliders}" method="get" class="filter-form" id="filterForm">
            <div class="form-group" style="flex: 2;">
                <label for="keyword">Tìm kiếm</label>
                <input type="text" id="keyword" name="keyword" class="form-control" th:value="${keyword}" placeholder="Tìm theo tiêu đề, link...">
            </div>
            <div class="form-group">
                <label for="status">Trạng thái</label>
                <select id="status" name="status" class="form-control">
                    <option value="" th:selected="${status == null or status == ''}">Tất cả trạng thái</option>
                    <option value="SHOW" th:selected="${status == 'SHOW'}">Hiển thị (SHOW)</option>
                    <option value="HIDE" th:selected="${status == 'HIDE'}">Đã ẩn (HIDE)</option>
                    <option value="PENDING" th:selected="${status == 'PENDING'}">Chờ duyệt (PENDING)</option>
                </select>
            </div>
            <button type="submit" class="btn-filter">
                <i class="ph ph-funnel"></i> Lọc
            </button>
            <a th:href="@{/marketing/sliders}" class="page-link" style="padding: 0 1.5rem; text-decoration: none;">
                Xóa lọc
            </a>
            <div style="margin-left: auto;">
                <a th:href="@{/marketing/sliders/create}" class="btn-create">
                    <i class="ph ph-plus"></i> Tạo Slider
                </a>
            </div>
            <input type="hidden" name="size" th:value="${currentSize != null ? currentSize : 10}">
        </form>

        <!-- Data Table -->
        <div class="blog-table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 140px;">Hình ảnh</th>
                        <th>Tiêu đề & Link</th>
                        <th style="text-align: center; width: 100px;">Thứ tự</th>
                        <th style="width: 120px;">Trạng thái</th>
                        <th style="width: 150px;">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="slider : ${sliderPage.content}">
                        <td>
                            <img th:if="${slider.imageUrl != null and !slider.imageUrl.isEmpty()}" th:src="${slider.imageUrl}" alt="Slider" class="slider-thumb">
                            <div th:if="${slider.imageUrl == null or slider.imageUrl.isEmpty()}" class="slider-thumb" style="display:flex; align-items:center; justify-content:center; color:var(--color-text-muted);">
                                <i class="ph ph-image" style="font-size: 1.5rem;"></i>
                            </div>
                        </td>
                        <td>
                            <div class="slider-title" th:text="${slider.title}">Tiêu đề slider</div>
                            <a th:if="${slider.linkUrl != null and !slider.linkUrl.isEmpty()}" th:href="${slider.linkUrl}" target="_blank" class="slider-link">
                                <i class="ph ph-link"></i> <span th:text="${slider.linkUrl}">https://example.com</span>
                            </a>
                            <span th:if="${slider.linkUrl == null or slider.linkUrl.isEmpty()}" class="slider-link" style="color:var(--color-text-muted);">-</span>
                        </td>
                        <td style="text-align: center; font-family: var(--font-mono); font-weight: 600;" th:text="${slider.orderNumber}">
                            1
                        </td>
                        <td>
                            <span class="status-badge active" th:if="${slider.status == 'SHOW'}">SHOW</span>
                            <span class="status-badge inactive" th:if="${slider.status == 'HIDE'}">HIDE</span>
                            <span class="status-badge" style="background:#fef3c7; color:#92400e;" th:if="${slider.status == 'PENDING'}">PENDING</span>
                        </td>
                        <td>
                            <div class="actions">
                                <a th:href="@{/marketing/sliders/update/{id}(id=${slider.id})}" class="btn-icon btn-edit" title="Sửa">
                                    <i class="ph ph-pencil-simple"></i>
                                </a>
                                <a th:if="${slider.status == 'HIDE'}" th:href="@{/marketing/sliders/sendApprove/{id}(id=${slider.id})}" class="btn-icon btn-send" title="Gửi duyệt">
                                    <i class="ph ph-paper-plane-tilt"></i>
                                </a>
                                <a th:href="@{/marketing/sliders/delete/{id}(id=${slider.id})}" class="btn-icon btn-delete" title="Xóa" onclick="return confirm('Bạn có chắc chắn muốn xóa slider này?');">
                                    <i class="ph ph-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${sliderPage == null or sliderPage.content.empty}">
                        <td colspan="5" style="text-align: center; padding: 4rem 2rem; color: var(--color-text-muted);">
                            <i class="ph ph-images" style="font-size: 3rem; margin-bottom: 1rem; display: block; opacity: 0.5;"></i>
                            Không tìm thấy slider nào phù hợp.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" th:if="${sliderPage != null and sliderPage.totalPages > 1}">
            <a th:href="@{/marketing/sliders(page=${currentPage - 1}, keyword=${keyword}, status=${status}, size=${currentSize})}" 
               class="page-link" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                <i class="ph ph-caret-left"></i>
            </a>

            <!-- For simplicity in UI logic matching backend provided model -->
            <span th:each="pageNumber : ${#numbers.sequence(startPage != null ? startPage : 0, endPage != null ? endPage : sliderPage.totalPages - 1)}">
                <a th:href="@{/marketing/sliders(page=${pageNumber}, keyword=${keyword}, status=${status}, size=${currentSize})}" 
                   class="page-link" th:classappend="${currentPage == pageNumber} ? 'active' : ''" th:text="${pageNumber + 1}">1</a>
            </span>

            <a th:href="@{/marketing/sliders(page=${currentPage + 1}, keyword=${keyword}, status=${status}, size=${currentSize})}" 
               class="page-link" th:classappend="${currentPage == sliderPage.totalPages - 1} ? 'disabled' : ''">
                <i class="ph ph-caret-right"></i>
            </a>
        </div>

    </div>

</body>
</html>
