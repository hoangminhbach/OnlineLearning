<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, pageContent, pageScripts)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:replace="${pageTitle}">Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #6c63ff;
            --primary-hover: #5a54d6;
            --secondary-color: #4ecdc4;
            --text-color: #333;
            --text-light: #666;
            --bg-color: #fff;
            --bg-light: #f8f9fa;
            --border-color: #e9ecef;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light); color: var(--text-color); line-height: 1.6;
        }
        .main-wrapper {
            display: flex;
            height: 100vh; /* Chiếm toàn bộ chiều cao */
        }
        .content-area {
            flex-grow: 1; /* Chiếm hết phần còn lại */
            padding: 20px;
            overflow-y: auto; /* Tự động cuộn khi nội dung dài */
        }
        .container {
            max-width: 1800px;
            margin: 0 auto; background: var(--bg-color); border-radius: var(--radius);
            box-shadow: var(--shadow); padding: 30px;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color);
        }
        .header h1 { color: var(--primary-color); font-size: 28px; font-weight: 600; }
        .btn {
            padding: 10px 20px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px;
            font-weight: 500; text-decoration: none; display: inline-flex; align-items: center;
            gap: 8px; transition: all 0.3s ease; white-space: nowrap;
        }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-outline-primary, .btn-outline { background: transparent; color: var(--primary-color); border: 2px solid var(--primary-color); }
        .btn-outline-primary:hover, .btn-outline:hover { background: var(--primary-color); color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-sm { padding: 6px 12px; font-size: 12px; gap: 4px; border-radius: 8px; }
        .filters {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;
            margin-bottom: 30px; padding: 25px; background: var(--bg-light);
            border-radius: var(--radius); border: 1px solid var(--border-color);
        }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 14px; font-weight: 500; color: var(--text-light); }
        .search-box { grid-column: 1 / -1; }
        select, input[type="text"] {
            padding: 12px 16px; border: 2px solid var(--border-color); border-radius: var(--radius);
            font-size: 14px; transition: all 0.3s ease; background: var(--bg-color); width: 100%;
        }
        select:focus, input[type="text"]:focus {
            outline: none; border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
        }
        .table-container { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; background: var(--bg-color); }
        th {
            background: var(--bg-light); padding: 16px 12px; text-align: left;
            font-weight: 600; color: var(--text-color); border-bottom: 2px solid var(--border-color);
            cursor: pointer; transition: background-color 0.3s ease; position: relative; white-space: nowrap;
        }
        th:hover { background: #e9ecef; }
        th a { color: inherit; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .sort-icon { color: var(--primary-color); font-weight: bold; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        tr:hover { background: #f8f9fa; }
        .actions { display: flex; gap: 8px; }
        .badge { font-size: 12px; padding: 6px 12px; border-radius: 20px; font-weight: 600; }
        .status-PUBLISHED { color: #198754; background: #d1e7dd; }
        .status-PENDING { color: #664d03; background: #fff3cd; }
        .status-DRAFT { color: #6c757d; background: #e2e3e5; }
        .status-active { color: #28a745; font-weight: 600; padding: 6px 12px; background: #d4edda; border-radius: 20px; font-size: 12px; }
        .status-inactive { color: #dc3545; font-weight: 600; padding: 6px 12px; background: #f8d7da; border-radius: 20px; font-size: 12px; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 30px; flex-wrap: wrap; }
        .pagination a, .pagination span { padding: 10px 16px; border: 2px solid var(--border-color); border-radius: var(--radius); text-decoration: none; color: var(--text-color); transition: all 0.3s ease; font-weight: 500; display: inline-block; }
        .pagination a:hover, .pagination span:not(.disabled):not(.active):hover { border-color: var(--primary-color); color: var(--primary-color); }
        .pagination span.active, .pagination a.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .pagination span.disabled { color: #adb5bd; background-color: var(--bg-light); border-color: var(--border-color); cursor: default; }
        .no-data { text-align: center; padding: 40px; color: var(--text-light); }
        @media (max-width: 992px) {
            .actions { flex-direction: column; align-items: flex-start; }
            .btn { width: 100%; justify-content: center; }
        }
        @media (max-width: 768px) {
            .filters { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 20px; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="main-wrapper">
    <div th:replace="~{components/_sidebar_admin :: main-sidebar}"></div>

    <div class="content-area" th:replace="${pageContent}">
        <h1>Chào mừng đến với Trang Quản Trị</h1>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<th:block th:replace="${pageScripts}"></th:block>
</body>
</html>
