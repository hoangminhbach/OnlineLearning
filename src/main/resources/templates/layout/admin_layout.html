<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, pageContent, pageScripts)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${pageTitle}">Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6c63ff;
            --primary-hover: #5a54d6;
            --secondary-color: #4ecdc4;
            --text-color: #333;
            --text-light: #666;
            --bg-color: #fff;
            --bg-light: #f8f9fa;
            --border-color: #e9ecef;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-light); color: var(--text-color); line-height: 1.6; }
        .main-wrapper { display: flex; height: 100vh; }
        .content-area { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .container { max-width: 1800px; margin: 0 auto; background: var(--bg-color); border-radius: var(--radius); box-shadow: var(--shadow); padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .header h1 { color: var(--primary-color); font-size: 28px; font-weight: 600; }

        /* Buttons */
        .btn { padding: 10px 20px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s ease; white-space: nowrap; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-outline-primary, .btn-outline { background: transparent; color: var(--primary-color); border: 2px solid var(--primary-color); }
        .btn-outline-primary:hover, .btn-outline:hover { background: var(--primary-color); color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        .btn-sm { padding: 6px 12px; font-size: 12px; gap: 4px; border-radius: 8px; }

        /* Filters */
        .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; padding: 25px; background: var(--bg-light); border-radius: var(--radius); border: 1px solid var(--border-color); }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 14px; font-weight: 500; color: var(--text-light); }
        .search-box { grid-column: 1 / -1; }

        /* Form Elements */
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .form-group label { font-size: 14px; font-weight: 500; color: var(--text-color); }
        .form-group label.required::after { content: " *"; color: #dc3545; }
        .input-field { padding: 12px 16px; border: 2px solid var(--border-color); border-radius: var(--radius); font-size: 14px; transition: all 0.3s ease; background: var(--bg-color); width: 100%; font-family: inherit; }
        .input-field:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1); }
        .input-field[readonly] { background: var(--bg-light); cursor: not-allowed; }
        textarea.input-field { resize: vertical; min-height: 100px; }
        input[type="email"], input[type="password"], input[type="url"], input[type="number"], input[type="date"] { padding: 12px 16px; border: 2px solid var(--border-color); border-radius: var(--radius); font-size: 14px; transition: all 0.3s ease; background: var(--bg-color); width: 100%; font-family: inherit; }
        input[type="email"]:focus, input[type="password"]:focus, input[type="url"]:focus, input[type="number"]:focus, input[type="date"]:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1); }
        select.input-field { padding: 12px 16px; cursor: pointer; }
        .checkbox-label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: normal; }
        .checkbox-label input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary-color); }
        .submit-btn { background: var(--primary-color); color: white; padding: 12px 24px; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; width: 100%; }
        .submit-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }

        /* Form Card */
        .form-card { background: var(--bg-color); border-radius: var(--radius); border: 1px solid var(--border-color); padding: 25px; margin-bottom: 20px; }
        .form-card-title { font-size: 18px; font-weight: 600; color: var(--primary-color); margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; }

        /* Detail Card */
        .detail-card { background: var(--bg-color); border-radius: var(--radius); border: 1px solid var(--border-color); padding: 25px; }
        .detail-card-title { font-size: 18px; font-weight: 600; color: var(--primary-color); margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .detail-row { display: flex; padding: 12px 0; border-bottom: 1px solid var(--border-color); }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { font-weight: 500; color: var(--text-light); width: 140px; flex-shrink: 0; }
        .detail-value { color: var(--text-color); }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px; border-radius: var(--radius); }
        .stat-card h3 { font-size: 14px; font-weight: 500; opacity: 0.9; margin-bottom: 10px; }
        .stat-card h2 { font-size: 32px; font-weight: 700; }
        .stat-revenue { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .stat-orders { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .stat-users { background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%); }

        /* Table */
        .table-container { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; background: var(--bg-color); }
        th { background: var(--bg-light); padding: 16px 12px; text-align: left; font-weight: 600; color: var(--text-color); border-bottom: 2px solid var(--border-color); cursor: pointer; transition: background-color 0.3s ease; position: relative; white-space: nowrap; }
        th:hover { background: #e9ecef; }
        th a { color: inherit; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .sort-icon { color: var(--primary-color); font-weight: bold; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        tr:hover { background: #f8f9fa; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }

        /* Badges & Status */
        .badge { font-size: 12px; padding: 6px 12px; border-radius: 20px; font-weight: 600; }
        .status-active { color: #28a745; font-weight: 600; padding: 6px 12px; background: #d4edda; border-radius: 20px; font-size: 12px; display: inline-block; }
        .status-inactive { color: #dc3545; font-weight: 600; padding: 6px 12px; background: #f8d7da; border-radius: 20px; font-size: 12px; display: inline-block; }
        .status-pending { color: #856404; font-weight: 600; padding: 6px 12px; background: #fff3cd; border-radius: 20px; font-size: 12px; display: inline-block; }

        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 30px; flex-wrap: wrap; }
        .pagination a, .pagination span { padding: 10px 16px; border: 2px solid var(--border-color); border-radius: var(--radius); text-decoration: none; color: var(--text-color); transition: all 0.3s ease; font-weight: 500; display: inline-block; }
        .pagination a:hover, .pagination span:not(.disabled):not(.active):hover { border-color: var(--primary-color); color: var(--primary-color); }
        .pagination span.active, .pagination a.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .pagination span.disabled { color: #adb5bd; background-color: var(--bg-light); border-color: var(--border-color); cursor: default; }

        /* Alerts */
        .alert { padding: 15px 20px; border-radius: var(--radius); margin-bottom: 20px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }

        /* Utilities */
        .no-data { text-align: center; padding: 40px; color: var(--text-light); }
        .text-muted { color: var(--text-light); font-size: 14px; }
        .mt-3 { margin-top: 20px; }
        .mt-4 { margin-top: 30px; }
        .mb-4 { margin-bottom: 20px; }
        .image-preview { margin-top: 15px; text-align: center; }
        .filter-group-inline { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .filter-group-inline select { flex: 1; min-width: 200px; }
        .row { display: flex; flex-wrap: wrap; margin: 0 -10px; }
        .row.g-4 { gap: 20px; }
        .col-md-6 { flex: 0 0 calc(50% - 10px); padding: 0 10px; }
        .col-md-4 { flex: 0 0 calc(33.333% - 10px); padding: 0 10px; }
        .col-md-8 { flex: 0 0 calc(66.666% - 10px); padding: 0 10px; }

        /* Select styling */
        select { padding: 12px 16px; border: 2px solid var(--border-color); border-radius: var(--radius); font-size: 14px; transition: all 0.3s ease; background: var(--bg-color); width: 100%; cursor: pointer; }
        select:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1); }

        /* Responsive */
        @media (max-width: 992px) { .actions { flex-direction: column; align-items: flex-start; } .btn { width: 100%; justify-content: center; } }
        @media (max-width: 768px) { .filters { grid-template-columns: 1fr; } .header { flex-direction: column; gap: 20px; align-items: flex-start; } .col-md-6, .col-md-4, .col-md-8 { flex: 0 0 100%; } }
    </style>
</head>
<body>
<div class="main-wrapper">
    <div th:replace="~{components/sidebar_admin :: main-sidebar}"></div>
    <div class="content-area">
        <th:block th:replace="${pageContent}"></th:block>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="${pageScripts}"></th:block>
</body>
</html>
